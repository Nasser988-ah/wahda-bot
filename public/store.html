<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>متجر</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13;
      --card: #1a1a22;
      --card-hover: #1f1f2a;
      --gold: #f5c842;
      --gold-light: #fde98a;
      --gold-dim: rgba(245,200,66,0.12);
      --text: #ffffff;
      --muted: #8a8a9a;
      --border: rgba(255,255,255,0.07);
      --radius: 20px;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-overflow-scrolling: touch;
    }
    
    /* Header Styles */
    .header {
      background: var(--bg);
      color: var(--text);
      padding: 20px 24px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }
    
    .header h1 { 
      font-size: 26px; 
      font-weight: 900; 
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .header h1::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }
    
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245,200,66,0.7); }
      50% { box-shadow: 0 0 0 8px rgba(245,200,66,0); }
    }
    
    .header p { 
      font-size: 13px; 
      color: var(--gold); 
      margin-top: 4px; 
      font-weight: 600;
    }
    
    /* Search Bar */
    .search-container {
      background: var(--bg);
      padding: 12px 16px;
      position: sticky;
      top: 76px;
      z-index: 98;
    }
    
    .search-box {
      display: flex;
      align-items: center;
      background: var(--card);
      border-radius: 14px;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s;
    }
    
    .search-box:focus-within {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }
    
    .search-box input {
      flex: 1;
      border: none;
      background: none;
      font-size: 16px;
      outline: none;
      color: var(--text);
      font-family: inherit;
    }
    
    .search-box input::placeholder {
      color: var(--muted);
    }
    
    .search-icon {
      font-size: 18px;
      margin-left: 8px;
      color: var(--muted);
    }
    
    .search-clear {
      font-size: 20px;
      color: var(--muted);
      cursor: pointer;
      padding: 0 4px;
      display: none;
      touch-action: manipulation;
    }
    
    .search-clear.visible {
      display: block;
    }

    /* Category Filter Bar */
    .category-bar {
      display: none;
      padding: 0 16px 8px;
      overflow-x: auto;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .category-bar::-webkit-scrollbar { display: none; }
    .category-bar.visible { display: flex; }
    .category-chip {
      flex-shrink: 0;
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      white-space: nowrap;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .category-chip:hover {
      border-color: var(--gold);
      color: var(--text);
    }
    .category-chip.active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--bg);
      font-weight: 700;
    }
    
    /* Cart Bar */
    .cart-bar {
      background: rgba(26, 26, 34, 0.98);
      backdrop-filter: blur(20px);
      color: var(--text);
      padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
      display: none;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 97;
      border-top: 1px solid rgba(245,200,66,0.2);
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .cart-bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--gold);
    }
    
    .cart-bar.visible { 
      display: flex; 
      transform: translateY(0);
    }
    
    .cart-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    
    .cart-count {
      font-size: 13px;
      color: var(--muted);
    }
    
    .cart-total {
      font-size: 22px;
      font-weight: 900;
      color: var(--text);
    }
    
    .order-btn {
      background: linear-gradient(135deg, #f5c842, #e6a800);
      color: var(--bg);
      border: none;
      padding: 14px 24px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 24px rgba(245,200,66,0.35);
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
      touch-action: manipulation;
      animation: pulse-gold 2s infinite;
    }
    
    @keyframes pulse-gold {
      0%, 100% { box-shadow: 0 4px 24px rgba(245,200,66,0.35); }
      50% { box-shadow: 0 4px 32px rgba(245,200,66,0.6); }
    }
    
    .order-btn:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 6px 28px rgba(245,200,66,0.5);
    }
    
    .order-btn:active { 
      transform: scale(0.96); 
      box-shadow: 0 2px 16px rgba(245,200,66,0.3);
    }
    
    /* Products Grid */
    .products-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 16px calc(100px + env(safe-area-inset-bottom));
    }
    
    .products-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    
    @media (min-width: 600px) {
      .products-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }
    }
    
    /* Product Card */
    .product-card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid transparent;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .product-card:nth-child(1) { animation-delay: 0.05s; }
    .product-card:nth-child(2) { animation-delay: 0.1s; }
    .product-card:nth-child(3) { animation-delay: 0.15s; }
    .product-card:nth-child(4) { animation-delay: 0.2s; }
    .product-card:nth-child(5) { animation-delay: 0.25s; }
    .product-card:nth-child(6) { animation-delay: 0.3s; }
    
    .product-card:hover { 
      transform: scale(1.02); 
      border-color: rgba(245,200,66,0.3);
      box-shadow: 0 8px 32px rgba(245,200,66,0.1);
    }
    
    @media (hover: none) {
      .product-card:hover { transform: none; }
      .product-card:active { transform: scale(0.97); }
    }
    
    .product-card.hidden {
      display: none;
    }
    
    .product-image-wrapper {
      position: relative;
      padding-top: 75%;
      background: linear-gradient(135deg, #1a1a22, #252530);
      overflow: hidden;
      cursor: pointer;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    
    .product-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transition: transform 0.4s ease;
      image-rendering: auto;
      background: linear-gradient(135deg, #1a1a22, #252530);
    }

    .product-image.contain-fit {
      object-fit: contain;
      padding: 8px;
    }
    
    .product-card:hover .product-image {
      transform: scale(1.05);
    }
    
    .product-image.placeholder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      background: linear-gradient(135deg, #1a1a22, #252530);
    }
    
    .zoom-hint {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(0,0,0,0.6);
      color: var(--text);
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 11px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .product-card:hover .zoom-hint {
      opacity: 1;
    }
    
    .product-info {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .product-category {
      font-size: 11px;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .product-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.4;
      color: var(--text);
    }
    
    .product-desc {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.5;
      flex: 1;
    }
    
    .product-price {
      color: var(--gold);
      font-weight: 900;
      font-size: 20px;
      margin-bottom: 14px;
    }
    
    .product-price::after {
      content: ' جنيه';
      font-size: 14px;
      font-weight: 400;
      color: var(--muted);
      margin-right: 4px;
    }
    
    /* Quantity Control */
    .quantity-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(255,255,255,0.03);
      padding: 8px;
      border-radius: 25px;
    }
    
    .qty-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 400;
      transition: all 0.2s;
      touch-action: manipulation;
      min-height: 44px;
      min-width: 44px;
    }
    
    .qty-btn.has-items { 
      background: var(--gold);
      border-color: var(--gold);
      color: var(--bg);
    }
    
    .qty-btn:hover { 
      transform: scale(1.1);
    }
    
    .qty-btn:active { 
      transform: scale(0.9);
    }
    
    .qty-display {
      font-size: 17px;
      font-weight: 700;
      min-width: 30px;
      text-align: center;
      color: var(--text);
    }
    
    .unavailable {
      opacity: 0.5;
      pointer-events: none;
    }
    
    .unavailable-label {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      margin-top: 10px;
    }
    
    /* Empty & Loading States */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      grid-column: 1 / -1;
    }
    
    .empty-state h2 { 
      font-size: 18px; 
      margin-bottom: 8px;
      color: var(--text);
    }
    
    .empty-state p {
      font-size: 14px;
      color: var(--muted);
    }
    
    .loader {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid var(--card);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .error-message {
      color: #e74c3c;
      text-align: center;
      padding: 20px;
    }
    
    /* Skeleton Loading */
    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, #222230 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius);
    }
    
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    
    .lightbox.visible {
      display: flex;
      animation: fadeIn 0.3s;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .lightbox img {
      max-width: 90%;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 32px;
      color: var(--text);
      cursor: pointer;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      transition: all 0.2s;
      touch-action: manipulation;
    }
    
    .lightbox-close:hover {
      background: rgba(255,255,255,0.2);
      transform: rotate(90deg);
    }
    
    .lightbox-caption {
      color: var(--text);
      margin-top: 16px;
      font-size: 16px;
      text-align: center;
      padding: 0 20px;
    }
    
    /* No Results */
    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      grid-column: 1 / -1;
    }
    
    .no-results-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    
    /* Cart Badge Animation */
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .cart-updating {
      animation: pulse 0.3s ease;
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    
    /* Mobile hidden scrollbar */
    @media (max-width: 768px) {
      ::-webkit-scrollbar { display: none; }
      
      /* Mobile Header */
      .header {
        padding: 15px 16px;
      }
      
      .header h1 {
        font-size: 20px;
      }
      
      .header p {
        font-size: 12px;
      }
      
      /* Mobile Search */
      .search-container {
        top: 65px;
        padding: 10px 12px;
      }
      
      .search-box {
        padding: 10px 14px;
        border-radius: 12px;
      }
      
      .search-box input {
        font-size: 14px;
      }
      
      /* Mobile Products Grid */
      .products-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 12px;
      }
      
      .product-card {
        border-radius: 16px;
        padding: 12px;
        transition: all 0.3s ease;
      }
      
      .product-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      }
      
      .product-image-wrapper {
        height: 140px;
        border-radius: 12px;
      }
      
      .product-image {
        border-radius: 12px;
      }
      
      .product-name {
        font-size: 14px;
        margin-bottom: 4px;
      }
      
      .product-price {
        font-size: 16px;
        margin-bottom: 8px;
      }
      
      .product-actions {
        gap: 6px;
      }
      
      .qty-btn {
        width: 32px;
        height: 32px;
        font-size: 14px;
        border-radius: 8px;
      }
      
      .qty-display {
        font-size: 14px;
        min-width: 24px;
      }
      
      /* Mobile Cart Bar */
      .cart-bar {
        padding: 12px 16px;
        border-radius: 20px 20px 0 0;
      }
      
      .cart-bar button {
        padding: 10px 20px;
        font-size: 14px;
        border-radius: 12px;
      }
      
      /* Mobile Empty States */
      .empty-state {
        padding: 40px 16px;
      }
      
      .empty-state h2 {
        font-size: 16px;
      }
      
      .empty-state p {
        font-size: 13px;
      }
      
      /* Mobile Lightbox */
      .lightbox-close {
        top: 12px;
        right: 12px;
        width: 36px;
        height: 36px;
        font-size: 24px;
      }
      
      .lightbox img {
        max-width: 95%;
        border-radius: 12px;
      }
      
      .lightbox-caption {
        font-size: 14px;
        padding: 0 16px;
      }
      
      /* Mobile Variant Styles */
      .variant-group-label {
        font-size: 10px;
        margin-bottom: 4px;
      }
      
      .variant-chip {
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 16px;
        min-height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .variant-chip-img {
        width: 30px;
        height: 30px;
        border-radius: 50%;
      }

      .variant-preview-img {
        max-height: 140px;
      }
    }
    
    @media (max-width: 480px) {
      /* Small Phone Styles */
      .products-grid {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 10px;
      }
      
      .product-card {
        padding: 10px;
      }
      
      .product-image-wrapper {
        height: 180px;
      }
      
      .header {
        padding: 12px 12px;
      }
      
      .header h1 {
        font-size: 18px;
      }
      
      .search-container {
        padding: 8px 10px;
      }
      
      .cart-bar {
        padding: 10px 12px;
      }
      
      .cart-bar button {
        padding: 8px 16px;
        font-size: 13px;
      }
    }

    .variant-group { margin-bottom: 10px; }

    .variant-group-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .variant-group-label .choose-hint {
      font-size: 10px;
      font-weight: 400;
      color: var(--gold, #25D366);
      opacity: 0.8;
    }

    .variant-group-label .choose-hint.done {
      color: #22c55e;
    }

    .variant-options {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .variant-chip {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .variant-chip:hover {
      border-color: var(--gold, #25D366);
      background: rgba(255,255,255,0.05);
    }

    .variant-chip.selected {
      border-color: var(--gold, #25D366);
      background: var(--gold, #25D366);
      color: #000;
      transform: scale(1.05);
    }

    .variant-chip.out-of-stock-opt {
      opacity: 0.4;
      text-decoration: line-through;
      pointer-events: none;
    }

    .variant-chip-img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2.5px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      touch-action: manipulation;
    }

    .variant-chip-img:hover {
      border-color: var(--gold, #25D366);
      transform: scale(1.1);
    }

    .variant-chip-img.selected {
      border-color: var(--gold, #25D366);
      box-shadow: 0 0 0 3px var(--gold, #25D366);
      transform: scale(1.15);
    }

    .variant-chip-img.out-of-stock-opt {
      opacity: 0.35;
      pointer-events: none;
      filter: grayscale(100%);
    }

    .variant-preview-img {
      width: 100%;
      border-radius: 10px;
      margin-top: 8px;
      max-height: 180px;
      object-fit: cover;
      animation: fadeIn 0.3s ease;
      border: 1px solid var(--border);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .variant-required-msg {
      font-size: 10px;
      color: #ef4444;
      margin-top: 4px;
      display: none;
    }

    .variant-required-msg.show {
      display: block;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .out-of-stock-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
      border-radius: inherit;
    }

    .product-card.out-of-stock { opacity: 0.65; }
    .product-card.out-of-stock .qty-control { display: none; }

    .add-cart-btn{width:100%;padding:10px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--gold),#e6a800);color:var(--bg);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;touch-action:manipulation;margin-top:auto;display:flex;align-items:center;justify-content:center;gap:6px}
    .add-cart-btn:active{transform:scale(.96)}
    .add-cart-btn.in-cart{background:transparent;border:1.5px solid var(--gold);color:var(--gold);font-size:12px}
    .card-badge{position:absolute;top:8px;right:8px;background:var(--gold);color:var(--bg);min-width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;z-index:5;padding:0 6px;box-shadow:0 2px 8px rgba(0,0,0,.4)}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;backdrop-filter:blur(4px)}
    .modal-overlay.open{display:block}
    .product-modal{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:24px 24px 0 0;z-index:501;max-height:85vh;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);padding-bottom:env(safe-area-inset-bottom)}
    .product-modal.open{transform:translateY(0)}
    .modal-handle{width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:12px auto}
    .modal-head{display:flex;align-items:center;gap:14px;padding:4px 20px 16px;border-bottom:1px solid var(--border)}
    .modal-pimg{width:72px;height:72px;border-radius:14px;object-fit:cover;background:var(--bg);flex-shrink:0}
    .modal-pinfo{flex:1;min-width:0}
    .modal-pname{font-size:16px;font-weight:700;margin-bottom:2px}
    .modal-pprice{color:var(--gold);font-size:18px;font-weight:800}
    .modal-pprice::after{content:' جنيه';font-size:12px;font-weight:400;color:var(--muted)}
    .modal-body{padding:16px 20px}
    .modal-vgroup{margin-bottom:14px}
    .modal-vlabel{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .modal-vlabel .chk{color:#22c55e;display:none}
    .modal-vlabel .chk.on{display:inline}
    .modal-vopts{display:flex;flex-wrap:wrap;gap:8px}
    .modal-qty-row{display:flex;align-items:center;justify-content:center;gap:20px;padding:16px 0;border-top:1px solid var(--border)}
    .modal-qty-btn{width:42px;height:42px;border-radius:50%;border:1.5px solid var(--border);background:transparent;color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .modal-qty-btn:active{background:var(--gold);color:var(--bg);border-color:var(--gold)}
    .modal-qty-val{font-size:22px;font-weight:800;min-width:40px;text-align:center}
    .modal-add-btn{width:calc(100% - 40px);margin:0 20px 20px;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--gold),#e6a800);color:var(--bg);font-size:16px;font-weight:800;cursor:pointer;font-family:inherit}
    .modal-add-btn:active{transform:scale(.97)}
    .drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;backdrop-filter:blur(4px)}
    .drawer-overlay.open{display:block}
    .cart-drawer{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-radius:24px 24px 0 0;z-index:601;max-height:80vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);padding-bottom:env(safe-area-inset-bottom)}
    .cart-drawer.open{transform:translateY(0)}
    .drawer-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 14px;border-bottom:1px solid var(--border)}
    .drawer-title{font-size:18px;font-weight:800}
    .drawer-clear{font-size:13px;color:#ef4444;background:none;border:none;cursor:pointer;font-family:inherit;font-weight:600}
    .drawer-items{flex:1;overflow-y:auto;padding:8px 20px}
    .ci{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
    .ci-img{width:52px;height:52px;border-radius:10px;object-fit:cover;background:var(--card);flex-shrink:0}
    .ci-info{flex:1;min-width:0}
    .ci-name{font-size:13px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ci-var{font-size:11px;color:var(--muted);margin-bottom:2px}
    .ci-price{font-size:13px;font-weight:800;color:var(--gold)}
    .ci-ctrls{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .ci-qbtn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .ci-qty{font-size:14px;font-weight:700;min-width:18px;text-align:center}
    .ci-del{color:#ef4444;background:none;border:none;font-size:16px;cursor:pointer;padding:4px}
    .drawer-foot{padding:14px 20px;border-top:1px solid var(--border);background:var(--card)}
    .drawer-total{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .drawer-total-l{font-size:14px;color:var(--muted)}
    .drawer-total-v{font-size:20px;font-weight:900;color:var(--gold)}
    .drawer-total-v::after{content:' جنيه';font-size:12px;font-weight:400}
    .drawer-order-btn{width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#25D366,#128C7E);color:white;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
    .drawer-order-btn:active{transform:scale(.97)}
    .drawer-empty{text-align:center;padding:40px 20px;color:var(--muted)}
  </style>
</head>
<body>

<div class="header">
  <h1 id="shopName">جارٍ التحميل...</h1>
  <p>اطلب الآن عبر واتساب</p>
</div>

<div class="search-container">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="ابحث عن منتج..." autocomplete="off">
    <span class="search-clear" id="searchClear">×</span>
  </div>
</div>

<div class="category-bar" id="categoryBar"></div>

<div class="cart-bar" id="cartBar">
  <div class="cart-info" onclick="openCartDrawer()" style="cursor:pointer">
    <span class="cart-count" id="cartCount">0 منتجات</span>
    <span class="cart-total" id="cartTotal">0 جنيه</span>
  </div>
  <button class="order-btn" onclick="openCartDrawer()">
    عرض السلة 🛒
  </button>
</div>

<div class="products-container">
  <div class="products-grid" id="productsGrid">
    <div class="empty-state">
      <div class="loader"></div>
      <p>جارٍ تحميل المنتجات...</p>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">×</span>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<!-- Product Modal (Bottom Sheet) -->
<div class="modal-overlay" id="productModal" onclick="closeProductModal()"></div>
<div class="product-modal" id="productSheet" onclick="event.stopPropagation()">
  <div class="modal-handle"></div>
  <div class="modal-head">
    <img class="modal-pimg" id="modalImg" src="" alt="">
    <div class="modal-pinfo">
      <div class="modal-pname" id="modalName"></div>
      <div class="modal-pprice" id="modalPrice"></div>
    </div>
  </div>
  <div class="modal-body" id="modalVariantsBody"></div>
  <div class="modal-qty-row">
    <button class="modal-qty-btn" onclick="modalChangeQty(-1)">−</button>
    <span class="modal-qty-val" id="modalQtyVal">1</span>
    <button class="modal-qty-btn" onclick="modalChangeQty(1)">+</button>
  </div>
  <button class="modal-add-btn" onclick="addToCartFromModal()">أضف للسلة</button>
</div>

<!-- Cart Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeCartDrawer()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="modal-handle"></div>
  <div class="drawer-head">
    <span class="drawer-title">سلة المشتريات</span>
    <button class="drawer-clear" onclick="clearCart()">مسح الكل</button>
  </div>
  <div class="drawer-items" id="drawerItems"></div>
  <div class="drawer-foot" id="drawerFoot">
    <div class="drawer-total">
      <span class="drawer-total-l">الإجمالي</span>
      <span class="drawer-total-v" id="drawerTotalVal">0</span>
    </div>
    <button class="drawer-order-btn" onclick="sendOrder()">أرسل الطلب عبر واتساب 💬</button>
  </div>
</div>

<script>
  // XSS sanitization - escape HTML in user-generated content
  function esc(str) {
    if (!str) return ''
    const d = document.createElement('div')
    d.textContent = str
    return d.innerHTML
  }

  // Extract shopId from URL path (e.g., /store/cmmsk09t1000a136jwrgk01jg)
  const pathParts = window.location.pathname.split('/')
  const shopId = pathParts[pathParts.length - 1]
  
  let allProducts = []
  let filteredProducts = []
  let cart = [] // { productIndex, variants: {gi: optName}, qty }
  let shopData = null
  let activeCategory = null
  let modalIdx = null
  let modalVariants = {}
  let modalQty = 1
  let modalGroups = []
  let modalImgMap = {}
  
  // Search functionality
  const searchInput = document.getElementById('searchInput')
  const searchClear = document.getElementById('searchClear')
  
  searchInput.addEventListener('input', (e) => {
    const query = e.target.value.trim().toLowerCase()
    searchClear.classList.toggle('visible', query.length > 0)
    filterProducts(query)
  })
  
  searchClear.addEventListener('click', () => {
    searchInput.value = ''
    searchClear.classList.remove('visible')
    filterProducts('')
    searchInput.focus()
  })
  
  function filterProducts(query) {
    let result = [...allProducts]
    
    // Apply category filter
    if (activeCategory) {
      result = result.filter(p => p.category && p.category === activeCategory)
    }
    
    // Apply search filter
    if (query) {
      result = result.filter(p => 
        p.name.toLowerCase().includes(query) || 
        (p.description && p.description.toLowerCase().includes(query)) ||
        (p.category && p.category.toLowerCase().includes(query))
      )
    }
    
    filteredProducts = result
    renderProducts()
  }

  function buildCategoryBar() {
    const bar = document.getElementById('categoryBar')
    const categories = [...new Set(allProducts.map(p => p.category).filter(Boolean))]
    if (categories.length < 2) { bar.classList.remove('visible'); return }

    bar.innerHTML = `<button class="category-chip active" onclick="setCategory(null, this)">الكل</button>` +
      categories.map(c => 
        `<button class="category-chip" onclick="setCategory('${esc(c)}', this)">${esc(c)}</button>`
      ).join('')
    bar.classList.add('visible')
  }

  function setCategory(cat, el) {
    activeCategory = cat
    document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'))
    el.classList.add('active')
    const query = searchInput.value.trim().toLowerCase()
    filterProducts(query)
  }
  
  async function loadShop() {
    console.log('Loading shop with ID:', shopId)
    
    if (!shopId) {
      document.getElementById('productsGrid').innerHTML = 
        '<div class="empty-state error-message"><h2>رابط غير صحيح</h2><p>معرّف المتجر غير موجود</p></div>'
      return
    }
    
    try {
      const res = await fetch(`/api/store/${shopId}`)
      console.log('API response status:', res.status)
      
      if (!res.ok) throw new Error('Failed to load')
      
      const data = await res.json()
      console.log('Shop data loaded:', data)
      
      shopData = data
      
      // Apply customization
      applyCustomization(data)
      
      document.title = data.name
      document.getElementById('shopName').textContent = data.name
      
      // Show all products including out of stock
      allProducts = data.products
      filteredProducts = [...allProducts]
      buildCategoryBar()
      renderProducts()
    } catch (err) {
      console.error('Error loading shop:', err)
      document.getElementById('productsGrid').innerHTML = 
        '<div class="empty-state error-message"><h2>خطأ في التحميل</h2><p>يرجى المحاولة مرة أخرى</p></div>'
    }
  }
  
  function getProductCartQty(idx) {
    return cart.filter(item => item.productIndex === idx).reduce((s, i) => s + i.qty, 0)
  }

  function hasProductVariants(p) {
    if (!p.variants) return false
    try { return JSON.parse(p.variants).length > 0 } catch { return false }
  }

  function renderProducts() {
    const grid = document.getElementById('productsGrid')
    
    if (allProducts.length === 0) {
      grid.innerHTML = '<div class="empty-state"><h2>لا توجد منتجات متاحة حالياً</h2></div>'
      return
    }
    
    if (filteredProducts.length === 0) {
      grid.innerHTML = `
        <div class="no-results">
          <div class="no-results-icon">🔍</div>
          <h2>لا توجد نتائج</h2>
          <p>جرب بحثًا مختلفًا</p>
        </div>
      `
      return
    }
    
    grid.innerHTML = filteredProducts.map((p, i) => {
      const idx = allProducts.findIndex(ap => ap.id === p.id)
      const inCart = getProductCartQty(idx)
      const isOOS = p.stock !== null && p.stock !== undefined && p.stock <= 0
      const hasV = hasProductVariants(p)
      return `
        <div class="product-card ${isOOS ? 'out-of-stock' : ''}" data-product-id="${p.id}">
          <div class="product-image-wrapper" onclick="${isOOS ? `openLightbox('${esc(p.imageUrl||'')}','${esc(p.name)}')` : `openProductModal(${idx})`}">
            ${inCart > 0 ? `<span class="card-badge">${inCart}</span>` : ''}
            ${p.imageUrl 
              ? `<img class="product-image" src="${esc(p.imageUrl)}" alt="${esc(p.name)}" loading="lazy" onload="smartFitImage(this)" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` 
              : ''}
            <div class="product-image placeholder" style="display:${p.imageUrl ? 'none' : 'flex'}">🛍️</div>
            ${isOOS ? '<div class="out-of-stock-overlay">سيتوفر قريباً</div>' : ''}
          </div>
          <div class="product-info">
            ${p.category ? `<div class="product-category">${esc(p.category)}</div>` : ''}
            <div class="product-name">${esc(p.name)}</div>
            ${p.description ? `<div class="product-desc">${esc(p.description)}</div>` : ''}
            <div class="product-price">${p.price}</div>
            ${!isOOS ? `
              <button class="add-cart-btn ${inCart > 0 ? 'in-cart' : ''}" onclick="openProductModal(${idx})">
                ${inCart > 0 ? 'في السلة ('+inCart+') · تعديل' : (hasV ? 'اختر الخيارات' : 'أضف للسلة +')}
              </button>` : ''}
          </div>
        </div>`
    }).join('')
  }
  
  function smartFitImage(img) {
    const r = img.naturalWidth / img.naturalHeight
    if (r < 0.5 || r > 2.5) img.classList.add('contain-fit')
  }

  function openLightbox(url, caption) {
    if (!url) return
    document.getElementById('lightboxImg').src = url
    document.getElementById('lightboxCaption').textContent = caption
    document.getElementById('lightbox').classList.add('visible')
    document.body.style.overflow = 'hidden'
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('visible')
    document.body.style.overflow = ''
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { closeLightbox(); closeProductModal(); closeCartDrawer() }
  })

  // === STOCK HELPER ===
  function getEffectiveStock(product, variants) {
    let stock = null
    if (product.variants) {
      try {
        const groups = JSON.parse(product.variants)
        for (let gi = 0; gi < groups.length; gi++) {
          const g = groups[gi]
          if (g.stock && variants[gi]) {
            const os = g.stock[variants[gi]]
            if (os !== null && os !== undefined) stock = stock === null ? os : Math.min(stock, os)
          }
        }
      } catch {}
    }
    if (stock === null && product.stock !== null && product.stock !== undefined) stock = product.stock
    return stock
  }

  // === PRODUCT MODAL (BOTTOM SHEET) ===
  function openProductModal(idx) {
    modalIdx = idx
    modalVariants = {}
    modalQty = 1
    const p = allProducts[idx]
    try { modalGroups = JSON.parse(p.variants || '[]') } catch { modalGroups = [] }
    try { modalImgMap = p.variantImages ? JSON.parse(p.variantImages) : {} } catch { modalImgMap = {} }

    document.getElementById('modalImg').src = p.imageUrl || ''
    document.getElementById('modalImg').style.display = p.imageUrl ? '' : 'none'
    document.getElementById('modalName').textContent = p.name
    document.getElementById('modalPrice').textContent = p.price

    const vBody = document.getElementById('modalVariantsBody')
    if (modalGroups.length > 0) {
      vBody.style.display = ''
      vBody.innerHTML = modalGroups.map((g, gi) => `
        <div class="modal-vgroup">
          <div class="modal-vlabel">${esc(g.name)} <span class="chk" id="mchk-${gi}">✓</span></div>
          <div class="modal-vopts">
            ${g.options.map((opt, oi) => {
              const os = g.stock ? g.stock[opt] : null
              const dead = os !== null && os !== undefined && os <= 0
              const low = os !== null && os !== undefined && os > 0 && os <= 5 ? ' ('+os+')' : ''
              const img = modalImgMap[opt]
              if (img) return '<img src="'+esc(img)+'" class="variant-chip-img'+(dead?' out-of-stock-opt':'')+'" title="'+esc(opt)+'" alt="'+esc(opt)+'" onclick="modalSelectVariant('+gi+','+oi+',this)">'
              return '<button class="variant-chip'+(dead?' out-of-stock-opt':'')+'" '+(dead?'disabled ':'')+' onclick="modalSelectVariant('+gi+','+oi+',this)">'+esc(opt)+low+(dead?' ❌':'')+'</button>'
            }).join('')}
          </div>
        </div>`).join('')
    } else {
      vBody.style.display = 'none'
      vBody.innerHTML = ''
    }

    document.getElementById('modalQtyVal').textContent = modalQty
    document.getElementById('productModal').classList.add('open')
    document.getElementById('productSheet').classList.add('open')
    document.body.style.overflow = 'hidden'
  }

  function closeProductModal() {
    document.getElementById('productModal').classList.remove('open')
    document.getElementById('productSheet').classList.remove('open')
    document.body.style.overflow = ''
  }

  function modalSelectVariant(gi, oi, el) {
    el.parentElement.querySelectorAll('.variant-chip,.variant-chip-img').forEach(e => e.classList.remove('selected'))
    el.classList.add('selected')
    modalVariants[gi] = modalGroups[gi].options[oi]
    const chk = document.getElementById('mchk-' + gi)
    if (chk) chk.classList.add('on')
  }

  function modalChangeQty(delta) {
    const nq = Math.max(1, modalQty + delta)
    const p = allProducts[modalIdx]
    const stock = getEffectiveStock(p, modalVariants)
    if (stock !== null && nq > stock) { showToast('الكمية المتاحة: ' + stock + ' فقط'); return }
    modalQty = nq
    document.getElementById('modalQtyVal').textContent = modalQty
  }

  function addToCartFromModal() {
    const p = allProducts[modalIdx]
    if (modalGroups.length > 0) {
      const allDone = modalGroups.every((_, i) => modalVariants[i] !== undefined)
      if (!allDone) { showToast('يرجى اختيار جميع الخيارات أولاً'); return }
    }
    const stock = getEffectiveStock(p, modalVariants)
    // Check if same product+variant combo already in cart
    const existIdx = cart.findIndex(item => {
      if (item.productIndex !== modalIdx) return false
      if (modalGroups.length === 0) return true
      return modalGroups.every((_, gi) => item.variants[gi] === modalVariants[gi])
    })
    if (existIdx >= 0) {
      const nq = cart[existIdx].qty + modalQty
      if (stock !== null && nq > stock) { showToast('الكمية المتاحة: ' + stock + '، لديك ' + cart[existIdx].qty + ' في السلة'); return }
      cart[existIdx].qty = nq
    } else {
      if (stock !== null && modalQty > stock) { showToast('الكمية المتاحة: ' + stock + ' فقط'); return }
      cart.push({ productIndex: modalIdx, variants: { ...modalVariants }, qty: modalQty })
    }
    closeProductModal()
    updateCartBar()
    renderProducts()
    showToast('تمت الإضافة للسلة ✓')
  }

  // === CART DRAWER ===
  function openCartDrawer() {
    renderCartDrawer()
    document.getElementById('drawerOverlay').classList.add('open')
    document.getElementById('cartDrawer').classList.add('open')
    document.body.style.overflow = 'hidden'
  }

  function closeCartDrawer() {
    document.getElementById('drawerOverlay').classList.remove('open')
    document.getElementById('cartDrawer').classList.remove('open')
    document.body.style.overflow = ''
  }

  function getCartItemVariantStr(item) {
    const p = allProducts[item.productIndex]
    if (!p.variants) return ''
    let groups = []
    try { groups = JSON.parse(p.variants) } catch { return '' }
    return groups.map((g, i) => item.variants[i] ? g.name + ': ' + item.variants[i] : '').filter(Boolean).join('، ')
  }

  function renderCartDrawer() {
    const container = document.getElementById('drawerItems')
    const foot = document.getElementById('drawerFoot')
    if (cart.length === 0) {
      container.innerHTML = '<div class="drawer-empty"><div style="font-size:48px;margin-bottom:12px">🛒</div><p>السلة فارغة</p></div>'
      foot.style.display = 'none'
      return
    }
    foot.style.display = ''
    container.innerHTML = cart.map((item, ci) => {
      const p = allProducts[item.productIndex]
      const vs = getCartItemVariantStr(item)
      const lt = p.price * item.qty
      return '<div class="ci">' +
        (p.imageUrl ? '<img class="ci-img" src="'+esc(p.imageUrl)+'" alt="">' : '<div class="ci-img" style="display:flex;align-items:center;justify-content:center;font-size:24px">🛍️</div>') +
        '<div class="ci-info"><div class="ci-name">'+esc(p.name)+'</div>' +
        (vs ? '<div class="ci-var">'+esc(vs)+'</div>' : '') +
        '<div class="ci-price">'+lt+' جنيه</div></div>' +
        '<div class="ci-ctrls">' +
        '<button class="ci-qbtn" onclick="updateCartItem('+ci+',-1)">−</button>' +
        '<span class="ci-qty">'+item.qty+'</span>' +
        '<button class="ci-qbtn" onclick="updateCartItem('+ci+',1)">+</button>' +
        '<button class="ci-del" onclick="removeCartItem('+ci+')">🗑</button>' +
        '</div></div>'
    }).join('')
    const total = cart.reduce((s, item) => s + allProducts[item.productIndex].price * item.qty, 0)
    document.getElementById('drawerTotalVal').textContent = total
  }

  function updateCartItem(ci, delta) {
    if (!cart[ci]) return
    const nq = cart[ci].qty + delta
    if (nq <= 0) { cart.splice(ci, 1) }
    else {
      const p = allProducts[cart[ci].productIndex]
      const stock = getEffectiveStock(p, cart[ci].variants)
      if (stock !== null && nq > stock) { showToast('الكمية المتاحة: ' + stock + ' فقط'); return }
      cart[ci].qty = nq
    }
    renderCartDrawer()
    updateCartBar()
    renderProducts()
  }

  function removeCartItem(ci) {
    cart.splice(ci, 1)
    renderCartDrawer()
    updateCartBar()
    renderProducts()
  }

  function clearCart() {
    if (cart.length === 0) return
    if (!confirm('مسح جميع المنتجات من السلة؟')) return
    cart = []
    renderCartDrawer()
    updateCartBar()
    renderProducts()
  }

  function updateCartBar() {
    const cartBar = document.getElementById('cartBar')
    if (cart.length === 0) { cartBar.classList.remove('visible'); return }
    const total = cart.reduce((s, item) => s + allProducts[item.productIndex].price * item.qty, 0)
    const count = cart.reduce((s, item) => s + item.qty, 0)
    document.getElementById('cartCount').textContent = count + ' ' + (count === 1 ? 'منتج' : 'منتجات')
    document.getElementById('cartTotal').textContent = total + ' جنيه'
    cartBar.classList.add('visible')
  }

  function sendOrder() {
    if (cart.length === 0) { showToast('السلة فارغة'); return }
    const lines = cart.map(item => {
      const p = allProducts[item.productIndex]
      const vs = getCartItemVariantStr(item)
      return vs ? p.name + ' (' + vs + ') × ' + item.qty : p.name + ' × ' + item.qty
    })
    const total = cart.reduce((s, item) => s + allProducts[item.productIndex].price * item.qty, 0)
    const message = 'طلب جديد من المتجر:\n━━━━━━━━━━━━━━━━━━━━\n' +
      lines.join('\n') + '\n━━━━━━━━━━━━━━━━━━━━\nالإجمالي: ' + total + ' جنيه\n[ORDER_FROM_WEBSITE]'
    const phoneNumber = shopData?.whatsappNumber || ''
    if (!phoneNumber) { showToast('رقم الواتساب غير متاح'); return }
    const cleanPhone = phoneNumber.replace(/\D/g, '')
    window.open('https://wa.me/' + cleanPhone + '?text=' + encodeURIComponent(message), '_blank')
    closeCartDrawer()
  }

  function showToast(message) {
    const toast = document.createElement('div')
    toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:white;padding:12px 24px;border-radius:12px;z-index:10000;font-size:14px;font-family:inherit;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);box-shadow:0 4px 20px rgba(0,0,0,.4)'
    toast.textContent = message
    document.body.appendChild(toast)
    setTimeout(() => toast.remove(), 2500)
  }
  
  // Apply customization from shop data
  function applyCustomization(data) {
    const root = document.documentElement;
    
    // Apply colors
    if (data.backgroundColor) root.style.setProperty('--bg', data.backgroundColor);
    if (data.secondaryColor) root.style.setProperty('--card', data.secondaryColor);
    if (data.primaryColor) root.style.setProperty('--gold', data.primaryColor);
    if (data.textColor) root.style.setProperty('--text', data.textColor);
    if (data.accentColor) root.style.setProperty('--gold-light', data.accentColor);
    
    // Apply font
    if (data.fontFamily) {
      document.body.style.fontFamily = `'${data.fontFamily}', 'Segoe UI', Tahoma, sans-serif`;
    }
    
    // Apply logo
    if (data.logoUrl) {
      const header = document.querySelector('.header');
      const shopName = document.getElementById('shopName');
      
      // Check if logo already exists
      let existingLogo = header.querySelector('img');
      if (!existingLogo) {
        const logoImg = document.createElement('img');
        logoImg.src = data.logoUrl;
        logoImg.style.cssText = 'width: 50px; height: 50px; object-fit: cover; border-radius: 50%; margin-bottom: 10px;';
        header.insertBefore(logoImg, shopName);
      }
    }
  }
  
  loadShop()
</script>

</body>
</html>
