services:
  - type: web
    name: wahda-bot
    env: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/products
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: wahda-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: wahda-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGINGFACE_TOKEN
        sync: false
      - key: CORS_ORIGIN
        value: "*"

  - type: redis
    name: wahda-redis
    plan: starter
    ipAllowList: []

databases:
  - name: wahda-db
    databaseName: wahda
    user: wahda
    plan: free
