services:
  - type: web
    name: wahda-bot
    env: node
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: wahda-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: BOT_NAME
        value: WahdaBot
      - key: BOT_SESSION_DIR
        value: ./sessions
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false

databases:
  - name: wahda-db
    databaseName: wahda
    user: wahda
    plan: free
