<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>متجر</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13;
      --card: #1a1a22;
      --card-hover: #1f1f2a;
      --gold: #f5c842;
      --gold-light: #fde98a;
      --gold-dim: rgba(245,200,66,0.12);
      --text: #ffffff;
      --muted: #8a8a9a;
      --border: rgba(255,255,255,0.07);
      --radius: 20px;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-overflow-scrolling: touch;
    }
    
    /* Header Styles */
    .header {
      background: var(--bg);
      color: var(--text);
      padding: 20px 24px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }
    
    .header h1 { 
      font-size: 26px; 
      font-weight: 900; 
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .header h1::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--gold);
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }
    
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245,200,66,0.7); }
      50% { box-shadow: 0 0 0 8px rgba(245,200,66,0); }
    }
    
    .header p { 
      font-size: 13px; 
      color: var(--gold); 
      margin-top: 4px; 
      font-weight: 600;
    }
    
    /* Search Bar */
    .search-container {
      background: var(--bg);
      padding: 12px 16px;
      position: sticky;
      top: 76px;
      z-index: 98;
    }
    
    .search-box {
      display: flex;
      align-items: center;
      background: var(--card);
      border-radius: 14px;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s;
    }
    
    .search-box:focus-within {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }
    
    .search-box input {
      flex: 1;
      border: none;
      background: none;
      font-size: 16px;
      outline: none;
      color: var(--text);
      font-family: inherit;
    }
    
    .search-box input::placeholder {
      color: var(--muted);
    }
    
    .search-icon {
      font-size: 18px;
      margin-left: 8px;
      color: var(--muted);
    }
    
    .search-clear {
      font-size: 20px;
      color: var(--muted);
      cursor: pointer;
      padding: 0 4px;
      display: none;
      touch-action: manipulation;
    }
    
    .search-clear.visible {
      display: block;
    }
    
    /* Cart Bar */
    .cart-bar {
      background: rgba(26, 26, 34, 0.98);
      backdrop-filter: blur(20px);
      color: var(--text);
      padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
      display: none;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 97;
      border-top: 1px solid rgba(245,200,66,0.2);
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .cart-bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--gold);
    }
    
    .cart-bar.visible { 
      display: flex; 
      transform: translateY(0);
    }
    
    .cart-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    
    .cart-count {
      font-size: 13px;
      color: var(--muted);
    }
    
    .cart-total {
      font-size: 22px;
      font-weight: 900;
      color: var(--text);
    }
    
    .order-btn {
      background: linear-gradient(135deg, #f5c842, #e6a800);
      color: var(--bg);
      border: none;
      padding: 14px 24px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 24px rgba(245,200,66,0.35);
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
      touch-action: manipulation;
      animation: pulse-gold 2s infinite;
    }
    
    @keyframes pulse-gold {
      0%, 100% { box-shadow: 0 4px 24px rgba(245,200,66,0.35); }
      50% { box-shadow: 0 4px 32px rgba(245,200,66,0.6); }
    }
    
    .order-btn:hover { 
      transform: translateY(-2px); 
      box-shadow: 0 6px 28px rgba(245,200,66,0.5);
    }
    
    .order-btn:active { 
      transform: scale(0.96); 
      box-shadow: 0 2px 16px rgba(245,200,66,0.3);
    }
    
    /* Products Grid */
    .products-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 16px calc(100px + env(safe-area-inset-bottom));
    }
    
    .products-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    
    @media (min-width: 600px) {
      .products-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }
    }
    
    /* Product Card */
    .product-card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid transparent;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .product-card:nth-child(1) { animation-delay: 0.05s; }
    .product-card:nth-child(2) { animation-delay: 0.1s; }
    .product-card:nth-child(3) { animation-delay: 0.15s; }
    .product-card:nth-child(4) { animation-delay: 0.2s; }
    .product-card:nth-child(5) { animation-delay: 0.25s; }
    .product-card:nth-child(6) { animation-delay: 0.3s; }
    
    .product-card:hover { 
      transform: scale(1.02); 
      border-color: rgba(245,200,66,0.3);
      box-shadow: 0 8px 32px rgba(245,200,66,0.1);
    }
    
    @media (hover: none) {
      .product-card:hover { transform: none; }
      .product-card:active { transform: scale(0.97); }
    }
    
    .product-card.hidden {
      display: none;
    }
    
    .product-image-wrapper {
      position: relative;
      padding-top: 75%;
      background: linear-gradient(135deg, #1a1a22, #252530);
      overflow: hidden;
      cursor: pointer;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    
    .product-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }
    
    .product-card:hover .product-image {
      transform: scale(1.05);
    }
    
    .product-image.placeholder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      background: linear-gradient(135deg, #1a1a22, #252530);
    }
    
    .zoom-hint {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(0,0,0,0.6);
      color: var(--text);
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 11px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .product-card:hover .zoom-hint {
      opacity: 1;
    }
    
    .product-info {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .product-category {
      font-size: 11px;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .product-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.4;
      color: var(--text);
    }
    
    .product-desc {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.5;
      flex: 1;
    }
    
    .product-price {
      color: var(--gold);
      font-weight: 900;
      font-size: 20px;
      margin-bottom: 14px;
    }
    
    .product-price::after {
      content: ' جنيه';
      font-size: 14px;
      font-weight: 400;
      color: var(--muted);
      margin-right: 4px;
    }
    
    /* Quantity Control */
    .quantity-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(255,255,255,0.03);
      padding: 8px;
      border-radius: 25px;
    }
    
    .qty-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 400;
      transition: all 0.2s;
      touch-action: manipulation;
      min-height: 44px;
      min-width: 44px;
    }
    
    .qty-btn.has-items { 
      background: var(--gold);
      border-color: var(--gold);
      color: var(--bg);
    }
    
    .qty-btn:hover { 
      transform: scale(1.1);
    }
    
    .qty-btn:active { 
      transform: scale(0.9);
    }
    
    .qty-display {
      font-size: 17px;
      font-weight: 700;
      min-width: 30px;
      text-align: center;
      color: var(--text);
    }
    
    .unavailable {
      opacity: 0.5;
      pointer-events: none;
    }
    
    .unavailable-label {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      margin-top: 10px;
    }
    
    /* Empty & Loading States */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      grid-column: 1 / -1;
    }
    
    .empty-state h2 { 
      font-size: 18px; 
      margin-bottom: 8px;
      color: var(--text);
    }
    
    .empty-state p {
      font-size: 14px;
      color: var(--muted);
    }
    
    .loader {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid var(--card);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .error-message {
      color: #e74c3c;
      text-align: center;
      padding: 20px;
    }
    
    /* Skeleton Loading */
    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, #222230 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius);
    }
    
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    
    .lightbox.visible {
      display: flex;
      animation: fadeIn 0.3s;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .lightbox img {
      max-width: 90%;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 32px;
      color: var(--text);
      cursor: pointer;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      transition: all 0.2s;
      touch-action: manipulation;
    }
    
    .lightbox-close:hover {
      background: rgba(255,255,255,0.2);
      transform: rotate(90deg);
    }
    
    .lightbox-caption {
      color: var(--text);
      margin-top: 16px;
      font-size: 16px;
      text-align: center;
      padding: 0 20px;
    }
    
    /* No Results */
    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      grid-column: 1 / -1;
    }
    
    .no-results-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    
    /* Cart Badge Animation */
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .cart-updating {
      animation: pulse 0.3s ease;
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    
    /* Mobile hidden scrollbar */
    @media (max-width: 768px) {
      ::-webkit-scrollbar { display: none; }
      
      /* Mobile Header */
      .header {
        padding: 15px 16px;
      }
      
      .header h1 {
        font-size: 20px;
      }
      
      .header p {
        font-size: 12px;
      }
      
      /* Mobile Search */
      .search-container {
        top: 65px;
        padding: 10px 12px;
      }
      
      .search-box {
        padding: 10px 14px;
        border-radius: 12px;
      }
      
      .search-box input {
        font-size: 14px;
      }
      
      /* Mobile Products Grid */
      .products-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 12px;
      }
      
      .product-card {
        border-radius: 16px;
        padding: 12px;
        transition: all 0.3s ease;
      }
      
      .product-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      }
      
      .product-image-wrapper {
        height: 140px;
        border-radius: 12px;
      }
      
      .product-image {
        border-radius: 12px;
      }
      
      .product-name {
        font-size: 14px;
        margin-bottom: 4px;
      }
      
      .product-price {
        font-size: 16px;
        margin-bottom: 8px;
      }
      
      .product-actions {
        gap: 6px;
      }
      
      .qty-btn {
        width: 32px;
        height: 32px;
        font-size: 14px;
        border-radius: 8px;
      }
      
      .qty-display {
        font-size: 14px;
        min-width: 24px;
      }
      
      /* Mobile Cart Bar */
      .cart-bar {
        padding: 12px 16px;
        border-radius: 20px 20px 0 0;
      }
      
      .cart-bar button {
        padding: 10px 20px;
        font-size: 14px;
        border-radius: 12px;
      }
      
      /* Mobile Empty States */
      .empty-state {
        padding: 40px 16px;
      }
      
      .empty-state h2 {
        font-size: 16px;
      }
      
      .empty-state p {
        font-size: 13px;
      }
      
      /* Mobile Lightbox */
      .lightbox-close {
        top: 12px;
        right: 12px;
        width: 36px;
        height: 36px;
        font-size: 24px;
      }
      
      .lightbox img {
        max-width: 95%;
        border-radius: 12px;
      }
      
      .lightbox-caption {
        font-size: 14px;
        padding: 0 16px;
      }
      
      /* Mobile Variant Styles */
      .variant-group-label {
        font-size: 10px;
        margin-bottom: 4px;
      }
      
      .variant-chip {
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 16px;
        min-height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .variant-chip-img {
        width: 30px;
        height: 30px;
        border-radius: 50%;
      }

      .variant-preview-img {
        max-height: 140px;
      }
    }
    
    @media (max-width: 480px) {
      /* Small Phone Styles */
      .products-grid {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 10px;
      }
      
      .product-card {
        padding: 10px;
      }
      
      .product-image-wrapper {
        height: 180px;
      }
      
      .header {
        padding: 12px 12px;
      }
      
      .header h1 {
        font-size: 18px;
      }
      
      .search-container {
        padding: 8px 10px;
      }
      
      .cart-bar {
        padding: 10px 12px;
      }
      
      .cart-bar button {
        padding: 8px 16px;
        font-size: 13px;
      }
    }

    .variant-group { margin-bottom: 10px; }

    .variant-group-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .variant-group-label .choose-hint {
      font-size: 10px;
      font-weight: 400;
      color: var(--gold, #25D366);
      opacity: 0.8;
    }

    .variant-group-label .choose-hint.done {
      color: #22c55e;
    }

    .variant-options {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .variant-chip {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .variant-chip:hover {
      border-color: var(--gold, #25D366);
      background: rgba(255,255,255,0.05);
    }

    .variant-chip.selected {
      border-color: var(--gold, #25D366);
      background: var(--gold, #25D366);
      color: #000;
      transform: scale(1.05);
    }

    .variant-chip.out-of-stock-opt {
      opacity: 0.4;
      text-decoration: line-through;
      pointer-events: none;
    }

    .variant-chip-img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2.5px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      touch-action: manipulation;
    }

    .variant-chip-img:hover {
      border-color: var(--gold, #25D366);
      transform: scale(1.1);
    }

    .variant-chip-img.selected {
      border-color: var(--gold, #25D366);
      box-shadow: 0 0 0 3px var(--gold, #25D366);
      transform: scale(1.15);
    }

    .variant-chip-img.out-of-stock-opt {
      opacity: 0.35;
      pointer-events: none;
      filter: grayscale(100%);
    }

    .variant-preview-img {
      width: 100%;
      border-radius: 10px;
      margin-top: 8px;
      max-height: 180px;
      object-fit: cover;
      animation: fadeIn 0.3s ease;
      border: 1px solid var(--border);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .variant-required-msg {
      font-size: 10px;
      color: #ef4444;
      margin-top: 4px;
      display: none;
    }

    .variant-required-msg.show {
      display: block;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .out-of-stock-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
      border-radius: inherit;
    }

    .product-card.out-of-stock { opacity: 0.65; }
    .product-card.out-of-stock .qty-control { display: none; }
  </style>
</head>
<body>

<div class="header">
  <h1 id="shopName">جارٍ التحميل...</h1>
  <p>اطلب الآن عبر واتساب</p>
</div>

<div class="search-container">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="ابحث عن منتج..." autocomplete="off">
    <span class="search-clear" id="searchClear">×</span>
  </div>
</div>

<div class="cart-bar" id="cartBar">
  <div class="cart-info">
    <span class="cart-count" id="cartCount">0 منتجات</span>
    <span class="cart-total" id="cartTotal">0 جنيه</span>
  </div>
  <button class="order-btn" onclick="sendOrder()">
    أرسل الطلب 🛒
  </button>
</div>

<div class="products-container">
  <div class="products-grid" id="productsGrid">
    <div class="empty-state">
      <div class="loader"></div>
      <p>جارٍ تحميل المنتجات...</p>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">×</span>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<script>
  // Extract shopId from URL path (e.g., /store/cmmsk09t1000a136jwrgk01jg)
  const pathParts = window.location.pathname.split('/')
  const shopId = pathParts[pathParts.length - 1] // Get the last part of the path
  const phone = '' // Phone is not needed for public store
  
  let allProducts = []
  let filteredProducts = []
  let quantities = {}
  let shopData = null
  
  // Search functionality
  const searchInput = document.getElementById('searchInput')
  const searchClear = document.getElementById('searchClear')
  
  searchInput.addEventListener('input', (e) => {
    const query = e.target.value.trim().toLowerCase()
    searchClear.classList.toggle('visible', query.length > 0)
    filterProducts(query)
  })
  
  searchClear.addEventListener('click', () => {
    searchInput.value = ''
    searchClear.classList.remove('visible')
    filterProducts('')
    searchInput.focus()
  })
  
  function filterProducts(query) {
    if (!query) {
      filteredProducts = [...allProducts]
    } else {
      filteredProducts = allProducts.filter(p => 
        p.name.toLowerCase().includes(query) || 
        (p.description && p.description.toLowerCase().includes(query)) ||
        (p.category && p.category.toLowerCase().includes(query))
      )
    }
    renderProducts()
  }
  
  async function loadShop() {
    console.log('Loading shop with ID:', shopId)
    
    if (!shopId) {
      document.getElementById('productsGrid').innerHTML = 
        '<div class="empty-state error-message"><h2>رابط غير صحيح</h2><p>معرّف المتجر غير موجود</p></div>'
      return
    }
    
    try {
      const res = await fetch(`/api/store/${shopId}`)
      console.log('API response status:', res.status)
      
      if (!res.ok) throw new Error('Failed to load')
      
      const data = await res.json()
      console.log('Shop data loaded:', data)
      
      shopData = data
      
      // Apply customization
      applyCustomization(data)
      
      document.title = data.name
      document.getElementById('shopName').textContent = data.name
      
      // Show all products including out of stock
      allProducts = data.products
      filteredProducts = [...allProducts]
      renderProducts()
    } catch (err) {
      console.error('Error loading shop:', err)
      document.getElementById('productsGrid').innerHTML = 
        '<div class="empty-state error-message"><h2>خطأ في التحميل</h2><p>يرجى المحاولة مرة أخرى</p></div>'
    }
  }
  
  function renderProducts() {
    const grid = document.getElementById('productsGrid')
    
    if (allProducts.length === 0) {
      grid.innerHTML = '<div class="empty-state"><h2>لا توجد منتجات متاحة حالياً</h2></div>'
      return
    }
    
    if (filteredProducts.length === 0) {
      grid.innerHTML = `
        <div class="no-results">
          <div class="no-results-icon">🔍</div>
          <h2>لا توجد نتائج</h2>
          <p>جرب بحثًا مختلفًا</p>
        </div>
      `
      return
    }
    
    grid.innerHTML = filteredProducts.map((p, i) => {
      const originalIndex = allProducts.findIndex(ap => ap.id === p.id)
      const qty = quantities[originalIndex] || 0
      const isOutOfStock = p.stock !== null && 
                         p.stock !== undefined && 
                         p.stock <= 0
      return `
        <div class="product-card ${isOutOfStock ? 'out-of-stock' : ''}" data-product-id="${p.id}">
          <div class="product-image-wrapper" onclick="openLightbox('${p.imageUrl || ''}', '${p.name}')">
            ${p.imageUrl 
              ? `<img class="product-image" src="${p.imageUrl}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">` 
              : ''
            }
            <div class="product-image placeholder" style="display: ${p.imageUrl ? 'none' : 'flex'}">🛍️</div>
            ${p.imageUrl ? '<span class="zoom-hint">🔍 تكبير</span>' : ''}
            ${isOutOfStock 
              ? `<div class="out-of-stock-overlay">سيتوفر قريباً</div>` 
              : ''}
          </div>
          <div class="product-info">
            ${p.category ? `<div class="product-category">${p.category}</div>` : ''}
            <div class="product-name">${p.name}</div>
            ${p.description ? `<div class="product-desc">${p.description}</div>` : ''}
            <div class="product-price">${p.price}</div>
            ${!isOutOfStock ? renderVariantSelectors(p) : ''}
            <div class="quantity-control">
              <button class="qty-btn ${qty > 0 ? 'has-items' : ''}" onclick="changeQty(${originalIndex}, -1)">−</button>
              <span class="qty-display" id="qty-${originalIndex}">${qty}</span>
              <button class="qty-btn ${qty > 0 ? 'has-items' : ''}" onclick="changeQty(${originalIndex}, 1)">+</button>
            </div>
          </div>
        </div>
      `
    }).join('')
  }
  
  // Lightbox functions
  function openLightbox(imageUrl, caption) {
    if (!imageUrl) return
    const lightbox = document.getElementById('lightbox')
    const img = document.getElementById('lightboxImg')
    const cap = document.getElementById('lightboxCaption')
    
    img.src = imageUrl
    cap.textContent = caption
    lightbox.classList.add('visible')
    document.body.style.overflow = 'hidden'
  }
  
  function closeLightbox() {
    const lightbox = document.getElementById('lightbox')
    lightbox.classList.remove('visible')
    document.body.style.overflow = ''
  }
  
  // Close lightbox on escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLightbox()
  })
  
  function changeQty(index, delta) {
    // NEW: check variants selected before adding
    if (delta === 1) {
      const p = allProducts[index]
      if (p?.variants) {
        let groups = []
        try { groups = JSON.parse(p.variants) } catch {}
        if (groups.length > 0) {
          const result = getVariantInfo(p.id)
          if (result === false) {
            showToast('يرجى اختيار جميع الخيارات أولاً')
            return
          }
        }
      }
      // Check per-variant stock limit
      let effectiveStock = null
      if (p?.variants) {
        try {
          const vGroups = JSON.parse(p.variants)
          const sel = selectedVariants[p.id] || {}
          for (let gi = 0; gi < vGroups.length; gi++) {
            const g = vGroups[gi]
            if (g.stock && sel[gi]) {
              const optStock = g.stock[sel[gi]]
              if (optStock !== null && optStock !== undefined) {
                effectiveStock = effectiveStock === null ? optStock : Math.min(effectiveStock, optStock)
              }
            }
          }
        } catch {}
      }
      // Fall back to product-level stock
      if (effectiveStock === null && p?.stock !== null && p?.stock !== undefined) {
        effectiveStock = p.stock
      }
      if (effectiveStock !== null) {
        const current = quantities[index] || 0
        if (current >= effectiveStock) {
          showToast(`الكمية المتاحة: ${effectiveStock} فقط`)
          return
        }
      }
    }
    
    const current = quantities[index] || 0
    const newQty = Math.max(0, current + delta)
    quantities[index] = newQty
    
    // Update display
    const qtyElements = document.querySelectorAll(`#qty-${index}`)
    qtyElements.forEach(el => el.textContent = newQty)
    
    // Update button styles
    const btns = document.querySelectorAll(`.qty-btn[onclick*="${index}"]`)
    btns.forEach(btn => {
      if (newQty > 0) {
        btn.classList.add('has-items')
      } else {
        btn.classList.remove('has-items')
      }
    })
    
    // Animate cart
    const cartBar = document.getElementById('cartBar')
    cartBar.classList.add('cart-updating')
    setTimeout(() => cartBar.classList.remove('cart-updating'), 300)
    
    updateCartBar()
  }
  
  function updateCartBar() {
    const cartBar = document.getElementById('cartBar')
    const items = Object.entries(quantities).filter(([_, q]) => q > 0)
    
    if (items.length === 0) {
      cartBar.classList.remove('visible')
      return
    }
    
    const total = items.reduce((sum, [i, q]) => 
      sum + allProducts[i].price * q, 0
    )
    const itemCount = items.reduce((sum, [_, q]) => sum + q, 0)
    
    document.getElementById('cartCount').textContent = 
      `${itemCount} ${itemCount === 1 ? 'منتج' : 'منتجات'}`
    document.getElementById('cartTotal').textContent = 
      `${total} جنيه`
    cartBar.classList.add('visible')
  }
  
  function sendOrder() {
    const items = Object.entries(quantities).filter(([_, q]) => q > 0)
    
    if (items.length === 0) {
      alert('يرجى اختيار منتج واحد على الأقل')
      return
    }
    
    // Build order message with variants
    const lines = items.map(([index, q]) => {
      const p = allProducts[index]
      if (!p) return null
      const variantInfo = getVariantInfo(p.id)
      return variantInfo
        ? `${p.name} (${variantInfo}) × ${q}` 
        : `${p.name} × ${q}` 
    }).filter(Boolean)
    
    const total = items.reduce((sum, [index, q]) => 
      sum + allProducts[index].price * q, 0
    )
    
    const message = 
      `طلب جديد من المتجر:\n` +
      `━━━━━━━━━━━━━━━━━━━━\n` +
      lines.join('\n') +
      `\n━━━━━━━━━━━━━━━━━━━━\n` +
      `الإجمالي: ${total} جنيه\n` +
      `[ORDER_FROM_WEBSITE]`
    
    // Use shop's WhatsApp number from API response
    const phoneNumber = shopData?.whatsappNumber || ''
    
    // Debug: Log the phone number to see what we're getting
    console.log('Shop WhatsApp number:', phoneNumber)
    console.log('Shop data:', shopData)
    
    if (!phoneNumber) {
      alert('رقم الواتساب غير متاح لهذا المتجر')
      return
    }
    
    // Clean phone number - remove any non-digits and ensure proper format
    const cleanPhone = phoneNumber.replace(/\D/g, '')
    console.log('Clean phone number:', cleanPhone)
    
    const waUrl = `https://wa.me/${cleanPhone}?text=${encodeURIComponent(message)}`
    console.log('WhatsApp URL:', waUrl)
    window.open(waUrl, '_blank')
  }

  // VARIANT MANAGEMENT
  const selectedVariants = {}

  function renderVariantSelectors(product) {
    if (!product.variants) return ''
    let groups = []
    try { groups = JSON.parse(product.variants) } catch { return '' }
    if (groups.length === 0) return ''

    let imgMap = {}
    try {
      imgMap = product.variantImages
        ? JSON.parse(product.variantImages) : {}
    } catch {}

    const hasAnyImages = groups.some(g => g.options.some(opt => imgMap[opt]))

    return `<div class="variant-selector-wrap" style="margin-bottom:10px">` +
      groups.map((g, gi) => {
        const sel = selectedVariants[product.id]
        const isSelected = sel && sel[gi] !== undefined
        return `
        <div class="variant-group">
          <div class="variant-group-label">
            ${g.name}
            <span class="choose-hint ${isSelected ? 'done' : ''}" id="hint-${product.id}-${gi}">
              ${isSelected ? '✓' : '← اضغط للاختيار'}
            </span>
          </div>
          <div class="variant-options">
            ${g.options.map(opt => {
              const img = imgMap[opt]
              const optStock = g.stock ? g.stock[opt] : null
              const isOOS = optStock !== null && optStock !== undefined && optStock <= 0
              const stockLabel = optStock !== null && optStock !== undefined && optStock > 0 && optStock <= 5
                ? ` (${optStock})` : ''
              if (img) {
                return `<img
                  src="${img}"
                  class="variant-chip-img ${isOOS ? 'out-of-stock-opt' : ''}"
                  title="${opt}${isOOS ? ' - غير متوفر' : ''}"
                  alt="${opt}"
                  data-pid="${product.id}"
                  data-gi="${gi}"
                  data-val="${opt}"
                  data-img="${img}"
                  onclick="selectChip(this,'${product.id}',${gi},'${opt}')">`
              }
              return `<button
                class="variant-chip ${isOOS ? 'out-of-stock-opt' : ''}"
                data-pid="${product.id}"
                data-gi="${gi}"
                data-val="${opt}"
                ${isOOS ? 'disabled' : ''}
                onclick="selectChip(this,'${product.id}',${gi},'${opt}')">
                ${opt}${stockLabel}${isOOS ? ' ❌' : ''}
              </button>`
            }).join('')}
          </div>
        </div>`
      }).join('') +
      `<div class="variant-preview-container" id="vpreview-${product.id}"></div>
       <div class="variant-required-msg" id="vreq-${product.id}">⚠️ يرجى اختيار جميع الخيارات</div>
      </div>`
  }

  function selectChip(el, pid, gi, val) {
    // Remove selected from same group
    document.querySelectorAll(
      `[data-pid="${pid}"][data-gi="${gi}"]` 
    ).forEach(e => e.classList.remove('selected'))
    el.classList.add('selected')
    if (!selectedVariants[pid]) selectedVariants[pid] = {}
    selectedVariants[pid][gi] = val

    // Update hint label
    const hint = document.getElementById(`hint-${pid}-${gi}`)
    if (hint) {
      hint.textContent = '✓'
      hint.classList.add('done')
    }

    // Hide required message if was showing
    const reqMsg = document.getElementById(`vreq-${pid}`)
    if (reqMsg) reqMsg.classList.remove('show')

    // Show image preview if variant has an image
    const imgSrc = el.dataset?.img || el.getAttribute('data-img')
    const previewContainer = document.getElementById(`vpreview-${pid}`)
    if (previewContainer && imgSrc) {
      previewContainer.innerHTML = `<img src="${imgSrc}" class="variant-preview-img" alt="${val}" onclick="openLightbox('${imgSrc}', '${val}')">`
    }
  }

  function getVariantInfo(pid) {
    const p = allProducts.find(p => p.id === pid)
    if (!p?.variants) return null
    let groups = []
    try { groups = JSON.parse(p.variants) } catch { return null }
    if (groups.length === 0) return null
    const sel = selectedVariants[pid] || {}
    const allDone = groups.every((_, i) => sel[i] !== undefined)
    if (!allDone) {
      // Show required message
      const reqMsg = document.getElementById(`vreq-${pid}`)
      if (reqMsg) reqMsg.classList.add('show')
      return false
    }
    return groups.map((g, i) => `${g.name}: ${sel[i]}`).join('، ')
  }

  function showToast(message) {
    // Simple toast implementation
    const toast = document.createElement('div')
    toast.style.cssText = `
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      z-index: 10000;
      font-size: 14px;
    `
    toast.textContent = message
    document.body.appendChild(toast)
    setTimeout(() => toast.remove(), 3000)
  }
  
  // Apply customization from shop data
  function applyCustomization(data) {
    const root = document.documentElement;
    
    // Apply colors
    if (data.backgroundColor) root.style.setProperty('--bg', data.backgroundColor);
    if (data.secondaryColor) root.style.setProperty('--card', data.secondaryColor);
    if (data.primaryColor) root.style.setProperty('--gold', data.primaryColor);
    if (data.textColor) root.style.setProperty('--text', data.textColor);
    if (data.accentColor) root.style.setProperty('--gold-light', data.accentColor);
    
    // Apply font
    if (data.fontFamily) {
      document.body.style.fontFamily = `'${data.fontFamily}', 'Segoe UI', Tahoma, sans-serif`;
    }
    
    // Apply logo
    if (data.logoUrl) {
      const header = document.querySelector('.header');
      const shopName = document.getElementById('shopName');
      
      // Check if logo already exists
      let existingLogo = header.querySelector('img');
      if (!existingLogo) {
        const logoImg = document.createElement('img');
        logoImg.src = data.logoUrl;
        logoImg.style.cssText = 'width: 50px; height: 50px; object-fit: cover; border-radius: 50%; margin-bottom: 10px;';
        header.insertBefore(logoImg, shopName);
      }
    }
  }
  
  loadShop()
</script>

</body>
</html>
