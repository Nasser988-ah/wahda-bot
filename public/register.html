<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - Zaki Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }
        
        .auth-container {
            width: 100%;
            max-width: 520px;
            animation: fadeInUp 0.8s ease-out;
        }
        
        .auth-card {
            padding: 2.5rem;
            text-align: center;
        }
        
        .auth-logo {
            margin-bottom: 1.5rem;
        }
        
        .auth-logo-icon {
            width: 70px;
            height: 70px;
            background: var(--gradient-primary);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            box-shadow: var(--shadow-glow);
        }
        
        .auth-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .auth-subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        
        .auth-form {
            text-align: right;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .auth-links {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }
        
        .auth-links a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 500;
            transition: color var(--transition-base);
        }
        
        .auth-links a:hover {
            color: var(--primary);
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            display: none;
        }
        
        .error-message.show {
            display: block;
            animation: fadeInUp 0.3s ease-out;
        }
        
        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .auth-card {
                padding: 1.5rem;
            }
            
            .auth-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card glass-card">
                <div class="auth-logo">
                    <div class="auth-logo-icon">🚀</div>
                    <h1 class="auth-title">انضم إلى Zaki</h1>
                    <p class="auth-subtitle">ابدأ رحلتك مع مساعدك الذكي</p>
                </div>
                
                <div id="errorMessage" class="error-message"></div>
                
                <form id="registerForm" class="auth-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">اسم المحل</label>
                            <input type="text" id="name" class="form-input" placeholder="مثال: بيتزا الحارة" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">اسم المالك</label>
                            <input type="text" id="ownerName" class="form-input" placeholder="الاسم الكامل" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">رقم الهاتف</label>
                            <input type="tel" id="phone" class="form-input" placeholder="01xxxxxxxxx" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">رقم واتساب للبوت</label>
                            <input type="tel" id="whatsappNumber" class="form-input" placeholder="01xxxxxxxxx" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">كلمة المرور</label>
                        <input type="password" id="password" class="form-input" placeholder="كلمة مرور قوية" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                        <span id="btnText">إنشاء الحساب</span>
                        <span id="btnLoader" class="hidden">⌛</span>
                    </button>
                </form>
                
                <div class="auth-links">
                    <p style="color: var(--text-secondary);">
                        لديك حساب بالفعل؟ 
                        <a href="login.html">تسجيل الدخول</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = window.location.origin + '/api';
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = e.target.querySelector('button');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const errorDiv = document.getElementById('errorMessage');
            
            btn.disabled = true;
            btnText.classList.add('hidden');
            btnLoader.classList.remove('hidden');
            errorDiv.classList.remove('show');
            
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        shopName: document.getElementById('name').value,
                        ownerName: document.getElementById('ownerName').value,
                        phone: document.getElementById('phone').value,
                        whatsappNumber: document.getElementById('whatsappNumber').value,
                        password: document.getElementById('password').value
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('shop', JSON.stringify(data.shop));
                    window.location.href = 'dashboard.html';
                } else {
                    errorDiv.textContent = data.error || 'فشل إنشاء الحساب';
                    errorDiv.classList.add('show');
                }
            } catch (error) {
                errorDiv.textContent = 'حدث خطأ في الاتصال';
                errorDiv.classList.add('show');
            } finally {
                btn.disabled = false;
                btnText.classList.remove('hidden');
                btnLoader.classList.add('hidden');
            }
        });
        
        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
