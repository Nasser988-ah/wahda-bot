<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المنتجات - Zaki Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #06b6d4;
            --accent: #8b5cf6;
            --dark: #0a0a0f;
            --darker: #050508;
            --card: rgba(20, 20, 30, 0.8);
            --text: #ffffff;
            --text-muted: #94a3b8;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--darker);
            color: var(--text);
            min-height: 100vh;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.1;
            animation: float 25s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            right: -100px;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: var(--secondary);
            bottom: -100px;
            left: -100px;
            animation-delay: -8s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .header {
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .brand-text {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-link:hover {
            color: var(--text);
        }

        .nav-link.active {
            color: var(--primary);
        }

        .logout-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--danger);
            color: var(--danger);
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 25px 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .btn-small {
            padding: 8px 14px;
            font-size: 12px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        @media (min-width: 768px) {
            .main-content {
                grid-template-columns: 380px 1fr;
            }
        }

        .form-section, .products-section {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            overflow: hidden;
        }

        .form-section::before, .products-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            color: var(--text);
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.08);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        input::placeholder, textarea::placeholder {
            color: var(--text-muted);
            opacity: 0.5;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .checkbox-group label {
            margin: 0;
            text-transform: none;
            letter-spacing: normal;
        }

        .search-filter {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
        }

        .filter-select {
            min-width: 150px;
        }

        .products-grid {
            display: grid;
            gap: 15px;
        }

        .product-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .product-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
            margin-left: 15px;
            background: var(--glass);
            border: 1px solid var(--border);
        }

        .product-image-upload {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .image-upload-label {
            cursor: pointer;
            color: var(--secondary);
            font-size: 13px;
            padding: 6px 12px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .image-upload-label:hover {
            background: var(--secondary);
            color: var(--darker);
        }

        .image-upload-input {
            display: none;
        }

        .image-upload-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        .product-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .product-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 4px;
        }

        .product-price {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .product-category {
            display: inline-block;
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .product-description {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .product-status {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .status-available {
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .status-unavailable {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .product-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--text-muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: var(--glass);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
            border: 1px solid var(--border);
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            border: 1px solid var(--border);
            color: white;
            padding: 16px 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.success {
            background: rgba(34, 197, 94, 0.95);
            border-color: var(--success);
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.95);
            border-color: var(--danger);
        }

        @media (max-width: 768px) {
            .header-content {
                padding: 0;
            }

            .nav-links {
                gap: 15px;
            }

            .nav-link {
                font-size: 13px;
            }

            .container {
                padding: 15px;
            }

            .page-header {
                flex-direction: column;
                align-items: stretch;
            }

            .page-title {
                font-size: 24px;
            }

            .search-filter {
                flex-direction: column;
            }

            .search-input,
            .filter-select {
                min-width: 100%;
            }

            .main-content {
                grid-template-columns: 1fr;
            }
        }

        @media (hover: none) {
            .btn:hover, .product-card:hover {
                transform: none;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
    </div>

    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <span class="brand-text">Zaki</span> Bot
            </div>
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link">لوحة التحكم</a>
                <a href="products.html" class="nav-link active">المنتجات</a>
                <a href="qr.html" class="nav-link">ربط واتساب</a>
                <button class="logout-btn" onclick="logout()">🚪 خروج</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">إدارة المنتجات</h1>
            <button class="btn" onclick="showAddForm()">إضافة منتج جديد</button>
        </div>

        <div class="main-content">
            <!-- Add/Edit Product Form -->
            <div class="form-section" id="formSection" style="display: none;">
                <h2 class="section-title" id="formTitle">إضافة منتج جديد</h2>
                <form id="productForm">
                    <input type="hidden" id="productId">
                    
                    <div class="form-group">
                        <label for="productName">اسم المنتج *</label>
                        <input type="text" id="productName" required>
                    </div>

                    <div class="form-group">
                        <label for="productPrice">السعر (ج.م) *</label>
                        <input type="number" id="productPrice" step="0.01" min="0" required>
                    </div>

                    <div class="form-group">
                        <label for="productCategory">الفئة</label>
                        <input type="text" id="productCategory" placeholder="مثال: مشروبات، حلويات">
                    </div>

                    <div class="form-group">
                        <label for="productDescription">الوصف</label>
                        <textarea id="productDescription" placeholder="وصف المنتج والمكونات..."></textarea>
                    </div>

                    <div class="form-group">
                        <div class="checkbox-group">
                            <input type="checkbox" id="productAvailable" checked>
                            <label for="productAvailable">متاح للطلب</label>
                        </div>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <button type="submit" class="btn" id="submitBtn">حفظ المنتج</button>
                        <button type="button" class="btn btn-secondary" onclick="hideForm()">إلغاء</button>
                    </div>
                </form>
            </div>

            <!-- Products List -->
            <div class="products-section">
                <h2 class="section-title">المنتجات</h2>
                
                <div class="search-filter">
                    <input type="text" class="search-input" id="searchInput" placeholder="البحث عن منتج...">
                    <select class="filter-select" id="categoryFilter">
                        <option value="">جميع الفئات</option>
                    </select>
                    <select class="filter-select" id="availabilityFilter">
                        <option value="">جميع المنتجات</option>
                        <option value="true">المتاحة فقط</option>
                        <option value="false">غير المتاحة</option>
                    </select>
                </div>

                <div class="products-grid" id="productsGrid">
                    <div class="loading">
                        <div class="spinner"></div>
                        <div>جاري تحميل المنتجات...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = window.location.origin + '/api';
        let currentProducts = [];
        let editingProduct = null;

        // Global API fetch helper with 401 handling
        async function apiFetch(url, options = {}) {
            const token = localStorage.getItem('token');
            
            const res = await fetch(url, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`,
                    ...options.headers
                }
            });
            
            if (res.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('shop');
                window.location.href = 'login.html';
                return;
            }
            
            return res;
        }

        // Initialize page
        window.addEventListener('load', async () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            await loadProducts();
            await loadCategories();
            
            // Setup search and filters
            document.getElementById('searchInput').addEventListener('input', filterProducts);
            document.getElementById('categoryFilter').addEventListener('change', filterProducts);
            document.getElementById('availabilityFilter').addEventListener('change', filterProducts);
        });

        // Load products
        async function loadProducts() {
            try {
                console.log('[DEBUG] Starting to load products...');
                const response = await apiFetch(`${API_BASE}/products`);
                
                if (!response) {
                    console.error('[ERROR] No response from API');
                    showToast('فشل تحميل المنتجات - لم يتم الحصول على رد من الخادم', 'error');
                    return;
                }

                console.log('[DEBUG] Response status:', response.status);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('[DEBUG] Full API Response:', JSON.stringify(data, null, 2));
                    console.log('[DEBUG] data.products:', data.products);
                    console.log('[DEBUG] data.products is array:', Array.isArray(data.products));
                    console.log('[DEBUG] data.products length:', data.products ? data.products.length : 'undefined');
                    
                    currentProducts = data.products || [];
                    console.log('[DEBUG] currentProducts after assignment:', currentProducts);
                    console.log('[DEBUG] currentProducts length:', currentProducts.length);
                    
                    displayProducts(currentProducts);
                    console.log('[DEBUG] displayProducts called with', currentProducts.length, 'products');
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    console.error('[ERROR] API returned', response.status, ':', errorData);
                    
                    // Show specific error messages
                    if (response.status === 503) {
                        showToast('قاعدة البيانات غير متاحة حالياً', 'error');
                    } else if (response.status === 401) {
                        showToast('جلستك انتهت، الرجاء تسجيل الدخول مجدداً', 'error');
                        setTimeout(() => window.location.href = 'login.html', 2000);
                    } else {
                        showToast(errorData.error || 'فشل تحميل المنتجات', 'error');
                    }
                    displayProducts([]);
                }
            } catch (error) {
                console.error('[ERROR] Exception loading products:', error);
                showToast('خطأ في تحميل المنتجات: ' + error.message, 'error');
                displayProducts([]);
            }
        }

        // Load categories
        async function loadCategories() {
            try {
                const response = await apiFetch(`${API_BASE}/products/categories/list`);
                if (!response) return;

                if (response.ok) {
                    const data = await response.json();
                    const categoryFilter = document.getElementById('categoryFilter');
                    
                    data.categories.forEach(category => {
                        const option = document.createElement('option');
                        option.value = category;
                        option.textContent = category;
                        categoryFilter.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }

        // Display products
        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');

            if (products.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📦</div>
                        <div>لا توجد منتجات حالياً</div>
                        <button class="btn" onclick="showAddForm()" style="margin-top: 20px;">
                            إضافة منتج جديد
                        </button>
                    </div>
                `;
                return;
            }

            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-header">
                        <div class="product-image-upload">
                            ${product.imageUrl 
                                ? `<img id="img-${product.id}" src="${product.imageUrl}" class="product-image" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🛍️</text></svg>'">`
                                : `<img id="img-${product.id}" src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='80'>🛍️</text></svg>" class="product-image">`
                            }
                            <div>
                                <label class="image-upload-label" for="file-${product.id}">
                                    📷 تغيير الصورة
                                    <input 
                                        type="file" 
                                        id="file-${product.id}" 
                                        class="image-upload-input"
                                        accept="image/*"
                                        onchange="uploadImage('${product.id}', this)"
                                    >
                                </label>
                                <div class="image-upload-spinner" id="spinner-${product.id}"></div>
                            </div>
                        </div>
                        <div style="flex: 1;">
                            <div class="product-name">${product.name}</div>
                            <div class="product-price">${product.price} ج.م</div>
                        </div>
                        <div class="product-status ${product.isAvailable ? 'status-available' : 'status-unavailable'}">
                            ${product.isAvailable ? 'متاح' : 'غير متاح'}
                        </div>
                    </div>
                    
                    ${product.category ? `<div class="product-category">${product.category}</div>` : ''}
                    
                    ${product.description ? `<div class="product-description">${product.description}</div>` : ''}
                    
                    <div class="product-actions">
                        <button class="btn btn-small" onclick="editProduct('${product.id}')">
                            تعديل
                        </button>
                        <button class="btn btn-danger btn-small" onclick="deleteProduct('${product.id}')">
                            حذف
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Filter products
        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const availability = document.getElementById('availabilityFilter').value;

            const filtered = currentProducts.filter(product => {
                const matchesSearch = product.name.toLowerCase().includes(searchTerm) ||
                                     (product.description && product.description.toLowerCase().includes(searchTerm));
                const matchesCategory = !category || product.category === category;
                const matchesAvailability = !availability || product.isAvailable.toString() === availability;

                return matchesSearch && matchesCategory && matchesAvailability;
            });

            displayProducts(filtered);
        }

        // Show add form
        function showAddForm() {
            editingProduct = null;
            document.getElementById('formTitle').textContent = 'إضافة منتج جديد';
            document.getElementById('submitBtn').textContent = 'حفظ المنتج';
            document.getElementById('productForm').reset();
            document.getElementById('formSection').style.display = 'block';
        }

        // Edit product
        function editProduct(productId) {
            const product = currentProducts.find(p => p.id === productId);
            if (!product) return;

            editingProduct = product;
            document.getElementById('formTitle').textContent = 'تعديل المنتج';
            document.getElementById('submitBtn').textContent = 'تحديث المنتج';
            
            document.getElementById('productId').value = product.id;
            document.getElementById('productName').value = product.name;
            document.getElementById('productPrice').value = product.price;
            document.getElementById('productCategory').value = product.category || '';
            document.getElementById('productDescription').value = product.description || '';
            document.getElementById('productAvailable').checked = product.isAvailable;
            
            document.getElementById('formSection').style.display = 'block';
        }

        // Hide form
        function hideForm() {
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('productForm').reset();
            editingProduct = null;
        }

        // Handle form submission
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                name: document.getElementById('productName').value,
                price: parseFloat(document.getElementById('productPrice').value),
                category: document.getElementById('productCategory').value || null,
                description: document.getElementById('productDescription').value || null,
                isAvailable: document.getElementById('productAvailable').checked
            };

            console.log('[DEBUG] Submitting product form:', formData, 'Editing:', editingProduct ? editingProduct.id : 'new');

            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'جاري الحفظ...';

            try {
                const url = editingProduct ? 
                    `${API_BASE}/products/${editingProduct.id}` : 
                    `${API_BASE}/products`;
                const method = editingProduct ? 'PUT' : 'POST';

                console.log('[DEBUG] API Request:', method, url);

                const response = await apiFetch(url, {
                    method,
                    body: JSON.stringify(formData)
                });
                
                if (!response) {
                    console.error('[ERROR] No response from server');
                    showToast('لم يتم الحصول على رد من الخادم', 'error');
                    return;
                }

                console.log('[DEBUG] Response status:', response.status);

                if (response.ok) {
                    const responseData = await response.json();
                    console.log('[DEBUG] Product saved successfully:', responseData);
                    showToast(editingProduct ? 'تم تحديث المنتج بنجاح' : 'تم إضافة المنتج بنجاح', 'success');
                    hideForm();
                    console.log('[DEBUG] Reloading products list...');
                    await loadProducts();
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    console.error('[ERROR] API returned', response.status, ':', errorData);
                    
                    if (response.status === 503) {
                        showToast('قاعدة البيانات غير متاحة', 'error');
                    } else {
                        showToast(errorData.error || 'فشل حفظ المنتج', 'error');
                    }
                }
            } catch (error) {
                console.error('[ERROR] Exception submitting form:', error);
                showToast('خطأ: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        // Delete product
        async function deleteProduct(productId) {
            if (!confirm('هل أنت متأكد من حذف هذا المنتج؟')) return;

            try {
                const response = await apiFetch(`${API_BASE}/products/${productId}`, {
                    method: 'DELETE'
                });
                
                if (!response) return;

                if (response.ok) {
                    showToast('تم حذف المنتج بنجاح', 'success');
                    await loadProducts();
                } else {
                    const error = await response.json();
                    showToast(error.error || 'فشل حذف المنتج', 'error');
                }
            } catch (error) {
                console.error('Error deleting product:', error);
                showToast('حدث خطأ في حذف المنتج', 'error');
            }
        }

        // Show toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Upload product image
        async function uploadImage(productId, input) {
            const file = input.files[0];
            if (!file) return;

            // Validate file type
            const allowedTypes = ['image/jpeg', 'image/png', 'image/webp'];
            if (!allowedTypes.includes(file.type)) {
                showToast('يُسمح فقط بصور JPG و PNG و WebP', 'error');
                input.value = '';
                return;
            }

            // Validate file size (2MB max)
            if (file.size > 2 * 1024 * 1024) {
                showToast('حجم الصورة يجب أن يكون أقل من 2 ميجابايت', 'error');
                input.value = '';
                return;
            }

            const formData = new FormData();
            formData.append('image', file);

            // Show spinner
            const spinner = document.getElementById(`spinner-${productId}`);
            spinner.style.display = 'inline-block';
            input.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/products/${productId}/image`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: formData
                });

                const data = await response.json();

                if (response.ok && data.imageUrl) {
                    // Add timestamp to prevent caching
                    const imgUrl = data.imageUrl + '?t=' + Date.now();
                    document.getElementById(`img-${productId}`).src = imgUrl;
                    showToast('تم رفع الصورة بنجاح', 'success');
                } else {
                    showToast(data.error || 'فشل رفع الصورة', 'error');
                }
            } catch (error) {
                console.error('Upload error:', error);
                showToast('حدث خطأ أثناء رفع الصورة', 'error');
            } finally {
                spinner.style.display = 'none';
                input.disabled = false;
                input.value = '';
            }
        }

        // Logout
        function logout() {
            if (confirm('هل أنت متأكد من تسجيل الخروج؟')) {
                localStorage.removeItem('token');
                localStorage.removeItem('shop');
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
