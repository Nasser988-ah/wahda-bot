<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل حساب جديد - واحة بوت</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h1 {
            color: #128C7E;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            text-align: right;
        }

        input:focus {
            outline: none;
            border-color: #25D366;
            box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .login-link {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .login-link a {
            color: #25D366;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s ease-in-out infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🤖</div>
        <h1>واحة بوت</h1>
        <p class="subtitle">إنشاء حساب جديد لمتجرك</p>

        <div class="error" id="error"></div>
        <div class="success" id="success"></div>

        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="name">اسم المتجر *</label>
                    <input type="text" id="name" name="name" placeholder="مثال: متجري المفضل" required>
                </div>

                <div class="form-group">
                    <label for="ownerName">اسم المالك *</label>
                    <input type="text" id="ownerName" name="ownerName" placeholder="اسمك الكامل" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="phone">رقم الهاتف *</label>
                    <input type="tel" id="phone" name="phone" placeholder="201234567890" required>
                </div>

                <div class="form-group">
                    <label for="whatsappNumber">رقم الواتساب *</label>
                    <input type="tel" id="whatsappNumber" name="whatsappNumber" placeholder="201234567890" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">كلمة المرور *</label>
                <input type="password" id="password" name="password" placeholder="أدخل كلمة مرور قوية" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">تأكيد كلمة المرور *</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="أعد إدخال كلمة المرور" required>
            </div>

            <button type="submit" class="btn" id="registerBtn">
                إنشاء حساب جديد
            </button>
        </form>

        <div class="login-link">
            <p>لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value,
                ownerName: document.getElementById('ownerName').value,
                phone: document.getElementById('phone').value,
                whatsappNumber: document.getElementById('whatsappNumber').value,
                password: document.getElementById('password').value,
                confirmPassword: document.getElementById('confirmPassword').value
            };
            
            const registerBtn = document.getElementById('registerBtn');
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');
            
            // Validation
            if (formData.password !== formData.confirmPassword) {
                showError('كلمتا المرور غير متطابقتين');
                return;
            }
            
            if (!formData.phone.startsWith('20') || formData.phone.length !== 12) {
                showError('رقم الهاتف يجب أن يبدأ بـ 20 ويكون 12 رقم');
                return;
            }
            
            if (!formData.whatsappNumber.startsWith('20') || formData.whatsappNumber.length !== 12) {
                showError('رقم الواتساب يجب أن يبدأ بـ 20 ويكون 12 رقم');
                return;
            }
            
            if (formData.password.length < 6) {
                showError('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }
            
            // Show loading
            registerBtn.disabled = true;
            registerBtn.innerHTML = 'جاري إنشاء الحساب<span class="loading"></span>';
            hideError();
            hideSuccess();
            
            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: formData.name,
                        ownerName: formData.ownerName,
                        phone: formData.phone,
                        whatsappNumber: formData.whatsappNumber,
                        password: formData.password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Save token and shop info
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('shop', JSON.stringify(data.shop));
                    
                    showSuccess('تم إنشاء الحساب بنجاح! جاري التحويل إلى لوحة التحكم...');
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                } else {
                    if (data.details && Array.isArray(data.details) && data.details.length > 0) {
                        const errorMessages = data.details.map(err => err.message).join(', ');
                        showError(errorMessages);
                    } else if (data.details) {
                        showError(data.details);
                    } else {
                        showError(data.error || 'فشل إنشاء الحساب');
                    }
                }
            } catch (error) {
                console.error('Registration error:', error);
                showError('حدث خطأ في الاتصال. يرجى المحاولة مرة أخرى');
            } finally {
                registerBtn.disabled = false;
                registerBtn.innerHTML = 'إنشاء حساب جديد';
            }
        });
        
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            hideSuccess();
        }
        
        function hideError() {
            document.getElementById('error').style.display = 'none';
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('success');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            hideError();
        }
        
        function hideSuccess() {
            document.getElementById('success').style.display = 'none';
        }
        
        // Check if already logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
