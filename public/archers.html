<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archers for Shooting Sports - Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #1a1a2e;
      --primary-light: #16213e;
      --accent: #e94560;
      --accent-glow: rgba(233, 69, 96, 0.3);
      --gold: #f0a500;
      --gold-glow: rgba(240, 165, 0, 0.2);
      --bg: #0f0f23;
      --card: #1a1a2e;
      --text: #e8e8e8;
      --text-dim: #8892b0;
      --bot-bubble: #16213e;
      --user-bubble: #e94560;
      --border: rgba(233, 69, 96, 0.15);
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* Background pattern */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(circle at 20% 20%, rgba(233, 69, 96, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(240, 165, 0, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .header-logo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      box-shadow: 0 0 15px var(--accent-glow);
    }

    .header-info h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }

    .header-info p {
      font-size: 12px;
      color: var(--gold);
      font-weight: 600;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-left: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Chat area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

    /* Messages */
    .message {
      display: flex;
      gap: 8px;
      max-width: 85%;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.bot { align-self: flex-start; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .message.bot .msg-avatar {
      background: linear-gradient(135deg, var(--accent), #c73650);
    }

    .message.user .msg-avatar {
      background: linear-gradient(135deg, var(--gold), #d4940a);
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.7;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.bot .msg-bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-bottom-right: 4px;
      color: var(--text);
    }

    .message.user .msg-bubble {
      background: linear-gradient(135deg, var(--user-bubble), #c73650);
      color: #fff;
      border-bottom-left: 4px;
    }

    .msg-time {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 4px;
      padding: 0 8px;
    }

    .message.user .msg-time { text-align: left; }
    .message.bot .msg-time { text-align: right; }

    /* Quick actions */
    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px 16px;
      animation: slideIn 0.3s ease;
    }

    .quick-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 20px;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .quick-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    /* Typing indicator */
    .typing {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      align-self: flex-start;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-radius: 18px;
    }

    .typing-dots span {
      width: 8px;
      height: 8px;
      background: var(--text-dim);
      border-radius: 50%;
      animation: typingBounce 1.4s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input area */
    .input-area {
      padding: 12px 16px;
      background: var(--primary);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-area input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 12px 20px;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .input-area input::placeholder {
      color: var(--text-dim);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #c73650);
      border: none;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .send-btn:active { transform: scale(0.95); }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Welcome banner */
    .welcome-banner {
      text-align: center;
      padding: 20px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .welcome-banner .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .welcome-banner h2 {
      font-size: 18px;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .welcome-banner p {
      font-size: 13px;
      color: var(--text-dim);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .header { padding: 12px 14px; }
      .header-logo { width: 40px; height: 40px; font-size: 20px; }
      .header-info h1 { font-size: 14px; }
      .chat-area { padding: 14px 10px; }
      .message { max-width: 90%; }
      .msg-bubble { font-size: 13px; padding: 10px 14px; }
    }

    /* Bold text support */
    .msg-bubble b, .msg-bubble strong {
      color: var(--gold);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="header-logo">🎯</div>
      <div class="header-info">
        <h1>Archers for Shooting Sports</h1>
        <p>مساعدك الذكي <span class="status-dot"></span> متصل</p>
      </div>
    </div>

    <!-- Chat -->
    <div class="chat-area" id="chatArea">
      <div class="welcome-banner">
        <div class="icon">🎯</div>
        <h2>Archers for Shooting Sports</h2>
        <p>مرحباً! أنا مساعدك الذكي. اكتب رسالتك أو اضغط ابدأ</p>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <input type="text" id="msgInput" placeholder="اكتب رسالتك..." autocomplete="off">
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api/public/archers';
    const sessionId = 'archers_' + Math.random().toString(36).substr(2, 12) + '_' + Date.now();
    const chatArea = document.getElementById('chatArea');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    let isLoading = false;

    // Format text: bold *text* and line breaks
    function formatText(text) {
      return text
        .replace(/\*([^*]+)\*/g, '<b>$1</b>')
        .replace(/\n/g, '<br>');
    }

    // Get current time string
    function getTime() {
      return new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    }

    // Add message to chat
    function addMessage(text, type, animate = true) {
      // Remove welcome banner
      const banner = chatArea.querySelector('.welcome-banner');
      if (banner) banner.remove();

      const wrapper = document.createElement('div');
      wrapper.style.display = 'contents';

      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${type}`;
      if (!animate) msgDiv.style.animation = 'none';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = type === 'bot' ? '🎯' : '👤';

      const contentDiv = document.createElement('div');

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.innerHTML = formatText(text);

      const time = document.createElement('div');
      time.className = 'msg-time';
      time.textContent = getTime();

      contentDiv.appendChild(bubble);
      contentDiv.appendChild(time);
      msgDiv.appendChild(avatar);
      msgDiv.appendChild(contentDiv);
      wrapper.appendChild(msgDiv);

      chatArea.appendChild(wrapper);
      scrollToBottom();

      // Extract quick actions from bot menu messages
      if (type === 'bot') {
        extractQuickActions(text);
      }
    }

    // Extract menu numbers for quick action buttons
    function extractQuickActions(text) {
      const lines = text.split('\n');
      const actions = [];
      for (const line of lines) {
        const match = line.match(/^(\d+)\.\s*(.+)/);
        if (match) {
          actions.push({ num: match[1], label: match[2].trim() });
        }
      }
      if (actions.length > 0) {
        const div = document.createElement('div');
        div.className = 'quick-actions';
        actions.forEach(a => {
          const btn = document.createElement('button');
          btn.className = 'quick-btn';
          btn.textContent = a.label;
          btn.onclick = () => {
            sendMessageText(a.num);
            div.remove();
          };
          div.appendChild(btn);
        });
        chatArea.appendChild(div);
        scrollToBottom();
      }
    }

    // Show typing indicator
    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typingIndicator';
      div.innerHTML = `
        <div class="msg-avatar" style="background: linear-gradient(135deg, var(--accent), #c73650);">🎯</div>
        <div class="typing-dots"><span></span><span></span><span></span></div>
      `;
      chatArea.appendChild(div);
      scrollToBottom();
    }

    function hideTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    function scrollToBottom() {
      setTimeout(() => {
        chatArea.scrollTop = chatArea.scrollHeight;
      }, 50);
    }

    // Send message
    async function sendMessage() {
      const text = msgInput.value.trim();
      if (!text || isLoading) return;
      sendMessageText(text);
    }

    async function sendMessageText(text) {
      if (isLoading) return;
      isLoading = true;
      sendBtn.disabled = true;
      msgInput.value = '';

      // Remove old quick actions
      chatArea.querySelectorAll('.quick-actions').forEach(el => el.remove());

      addMessage(text, 'user');
      showTyping();

      try {
        const res = await fetch(API_BASE + '/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, sessionId }),
        });

        hideTyping();

        if (!res.ok) {
          addMessage('عذراً، حدث خطأ. حاول مرة أخرى 🙏', 'bot');
          return;
        }

        const data = await res.json();
        addMessage(data.response, 'bot');
      } catch (err) {
        hideTyping();
        addMessage('عذراً، لا يمكن الاتصال بالخادم. تأكد من اتصالك بالإنترنت 📡', 'bot');
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        msgInput.focus();
      }
    }

    // Enter to send
    msgInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Auto-start: send greeting to get welcome + menu
    window.addEventListener('load', () => {
      setTimeout(() => {
        sendMessageText('هاي');
      }, 500);
    });
  </script>
</body>
</html>
