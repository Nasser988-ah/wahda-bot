<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Zaki Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }
        
        .sidebar {
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            padding: var(--space-lg);
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            width: 250px;
            overflow-y: auto;
            z-index: 100;
        }
        
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            margin-bottom: var(--space-xl);
            padding-bottom: var(--space-md);
            border-bottom: 1px solid var(--border-color);
        }
        
        .sidebar-logo-icon {
            width: 45px;
            height: 45px;
            background: var(--gradient-primary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .sidebar-logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-item {
            margin-bottom: var(--space-xs);
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md);
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: all var(--transition-base);
        }
        
        .nav-link:hover,
        .nav-link.active {
            background: var(--bg-glass);
            color: var(--text-primary);
        }
        
        .nav-link.active {
            background: var(--gradient-primary);
            color: white;
        }
        
        .main-content {
            margin-right: 250px;
            padding: var(--space-lg);
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-lg);
        }
        
        .quick-actions {
            display: flex;
            gap: var(--space-sm);
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .status-badge.connected {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        .status-badge.disconnected {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .recent-orders {
            margin-top: var(--space-lg);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-md);
        }
        
        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .orders-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .orders-table th,
        .orders-table td {
            padding: var(--space-sm) var(--space-md);
            text-align: right;
            border-bottom: 1px solid var(--border-color);
        }
        
        .orders-table th {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.875rem;
        }
        
        .orders-table tr:hover td {
            background: var(--bg-glass);
        }
        
        .order-status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .order-status.pending {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }
        
        .order-status.confirmed {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        
        .order-status.cancelled {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                transform: translateX(100%);
                transition: transform var(--transition-base);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .main-content {
                margin-right: 0;
            }
        }
        
        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                gap: var(--space-sm);
                align-items: flex-start;
            }
            
            .quick-actions {
                width: 100%;
                flex-wrap: wrap;
            }
            
            .orders-table {
                display: block;
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="dashboard-grid">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">🤖</div>
                <span class="sidebar-logo-text">Zaki</span>
            </div>
            
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a href="dashboard.html" class="nav-link active">
                            <span>📊</span>
                            <span>لوحة التحكم</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html" class="nav-link">
                            <span>📦</span>
                            <span>المنتجات</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="qr.html" class="nav-link">
                            <span>📱</span>
                            <span>اتصال الواتساب</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>
        
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">لوحة التحكم</h1>
                    <p class="page-subtitle" id="shopName">مرحباً بك في Zaki</p>
                </div>
                <div class="quick-actions">
                    <span id="connectionStatus" class="status-badge disconnected">
                        <span class="animate-pulse">●</span>
                        غير متصل
                    </span>
                    <button class="btn btn-secondary" onclick="logout()">
                        <span>🚪</span>
                        <span>تسجيل الخروج</span>
                    </button>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card glass-card">
                    <div class="stat-icon">📦</div>
                    <div class="stat-value" id="totalProducts">0</div>
                    <div class="stat-label">إجمالي المنتجات</div>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-icon">🛒</div>
                    <div class="stat-value" id="todayOrders">0</div>
                    <div class="stat-label">طلبات اليوم</div>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-icon">💰</div>
                    <div class="stat-value" id="totalRevenue">0</div>
                    <div class="stat-label">الإيرادات (جنيه)</div>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-value" id="totalCustomers">0</div>
                    <div class="stat-label">العملاء</div>
                </div>
            </div>
            
            <div class="recent-orders">
                <div class="section-header">
                    <h2 class="section-title">📋 آخر الطلبات</h2>
                    <a href="#" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.875rem;">
                        عرض الكل
                    </a>
                </div>
                <div class="glass-card" style="padding: 0; overflow: hidden;">
                    <table class="orders-table">
                        <thead>
                            <tr>
                                <th>رقم الطلب</th>
                                <th>العميل</th>
                                <th>المبلغ</th>
                                <th>الحالة</th>
                                <th>التاريخ</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody">
                            <tr>
                                <td colspan="5" style="text-align: center; color: var(--text-secondary); padding: var(--space-lg);">
                                    لا توجد طلبات حالياً
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        const API_URL = window.location.origin + '/api';
        
        // Check auth
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
        }
        
        // Load shop data
        const shop = JSON.parse(localStorage.getItem('shop') || '{}');
        if (shop.name) {
            document.getElementById('shopName').textContent = `متجر: ${shop.name}`;
        }
        
        // Load dashboard data
        async function loadDashboard() {
            try {
                const response = await fetch(`${API_URL}/products`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('totalProducts').textContent = data.total || 0;
                    document.getElementById('todayOrders').textContent = data.todayOrders || 0;
                    document.getElementById('totalRevenue').textContent = data.totalRevenue || 0;
                    document.getElementById('totalCustomers').textContent = data.totalCustomers || 0;
                    
                    // Update orders table
                    if (data.recentOrders && data.recentOrders.length > 0) {
                        const tbody = document.getElementById('ordersTableBody');
                        tbody.innerHTML = data.recentOrders.map(order => `
                            <tr>
                                <td>#${order.id.slice(-6)}</td>
                                <td>${order.customerName}</td>
                                <td>${order.totalPrice} ج.م</td>
                                <td><span class="order-status ${order.status.toLowerCase()}">${getStatusText(order.status)}</span></td>
                                <td>${new Date(order.createdAt).toLocaleDateString('ar-EG')}</td>
                            </tr>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error('Failed to load dashboard:', error);
            }
        }
        
        // Check connection status
        async function checkConnection() {
            try {
                const response = await fetch(`${API_URL}/bot/status`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const statusEl = document.getElementById('connectionStatus');
                if (response.ok) {
                    const data = await response.json();
                    if (data.connected) {
                        statusEl.className = 'status-badge connected';
                        statusEl.innerHTML = '<span>●</span> متصل';
                    } else {
                        statusEl.className = 'status-badge disconnected';
                        statusEl.innerHTML = '<span class="animate-pulse">●</span> غير متصل';
                    }
                }
            } catch (error) {
                console.error('Failed to check connection:', error);
            }
        }
        
        function getStatusText(status) {
            const statuses = {
                'PENDING': 'معلق',
                'CONFIRMED': 'مؤكد',
                'CANCELLED': 'ملغي',
                'DELIVERED': 'تم التوصيل'
            };
            return statuses[status] || status;
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('shop');
            window.location.href = 'login.html';
        }
        
        // Initial load
        loadDashboard();
        checkConnection();
        
        // Refresh every 30 seconds
        setInterval(() => {
            loadDashboard();
            checkConnection();
        }, 30000);
    </script>
</body>
</html>
