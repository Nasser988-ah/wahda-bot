<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>تسجيل حساب جديد - Zaki Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #06b6d4;
            --accent: #8b5cf6;
            --dark: #0a0a0f;
            --darker: #050508;
            --card: rgba(20, 20, 30, 0.8);
            --text: #ffffff;
            --text-muted: #94a3b8;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--darker);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--primary);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: var(--secondary);
            bottom: -50px;
            left: -50px;
            animation-delay: -7s;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: var(--accent);
            top: 50%;
            left: 50%;
            animation-delay: -14s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -50px) scale(1.1); }
            50% { transform: translate(-30px, 30px) scale(0.9); }
            75% { transform: translate(-50px, -30px) scale(1.05); }
        }

        .grid-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 15px 50px rgba(99, 102, 241, 0.6); }
        }

        h1 {
            color: var(--text);
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 400;
        }

        .brand-highlight {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
            transition: color 0.3s;
        }

        input {
            width: 100%;
            padding: 14px 44px 14px 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.08);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        input:focus + .input-icon {
            color: var(--primary);
        }

        input::placeholder {
            color: var(--text-muted);
            opacity: 0.5;
        }

        .btn {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 10px;
            animation: shake 0.5s ease-in-out;
        }

        .alert.show {
            display: flex;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .login-section {
            text-align: center;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .login-section p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .login-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .login-link:hover {
            color: var(--secondary);
            gap: 10px;
        }

        .loading {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-row .form-group {
            margin-bottom: 15px;
        }

        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.3;
            pointer-events: none;
            animation: particle-float 15s infinite;
        }

        @keyframes particle-float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 480px) {
            .glass-card {
                padding: 28px 20px;
                border-radius: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .logo {
                width: 70px;
                height: 70px;
                font-size: 30px;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            input {
                padding: 12px 40px 12px 12px;
            }
        }

        @media (hover: none) {
            .btn:hover {
                transform: none;
            }
            
            .btn:active {
                transform: scale(0.98);
            }
        }

        /* Bot Type Selection */
        .bot-type-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .bot-type-card {
            background: var(--glass);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .bot-type-card:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            transform: translateY(-2px);
        }

        .bot-type-card.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .bot-type-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .bot-type-title {
            color: var(--text);
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .bot-type-desc {
            color: var(--text-muted);
            font-size: 12px;
            line-height: 1.5;
        }

        .bot-type-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .badge-available {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .badge-vip {
            background: rgba(245, 200, 66, 0.15);
            color: #f5c842;
            border: 1px solid rgba(245, 200, 66, 0.3);
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            transition: all 0.3s;
        }

        .step-dot.active {
            background: var(--primary);
            width: 24px;
            border-radius: 4px;
        }

        .hidden { display: none !important; }

        .back-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            margin-bottom: 16px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            border-color: var(--primary);
            color: var(--text);
        }

        textarea {
            width: 100%;
            padding: 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.08);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .custom-request-note {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 16px;
            padding: 12px;
            background: rgba(245, 200, 66, 0.05);
            border: 1px solid rgba(245, 200, 66, 0.15);
            border-radius: 10px;
        }

        @media (max-width: 480px) {
            .bot-type-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>
    <div class="grid-pattern"></div>

    <!-- Floating particles -->
    <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 30%; animation-delay: 3s;"></div>
    <div class="particle" style="left: 50%; animation-delay: 6s;"></div>
    <div class="particle" style="left: 70%; animation-delay: 9s;"></div>
    <div class="particle" style="left: 90%; animation-delay: 12s;"></div>

    <div class="container">
        <div class="glass-card">
            <div class="logo-container">
                <div class="logo">⚡</div>
                <h1><span class="brand-highlight">Zaki</span> Bot</h1>
                <p class="subtitle" id="pageSubtitle">اختر نوع البوت المناسب لك</p>
            </div>

            <div class="step-indicator">
                <div class="step-dot active" id="stepDot1"></div>
                <div class="step-dot" id="stepDot2"></div>
            </div>

            <div class="alert alert-error" id="error">
                <span>⚠️</span>
                <span id="errorText"></span>
            </div>
            <div class="alert alert-success" id="success">
                <span>✓</span>
                <span id="successText"></span>
            </div>

            <!-- STEP 1: Bot Type Selection -->
            <div id="step1">
                <div class="bot-type-grid">
                    <div class="bot-type-card" onclick="selectBotType('traditional')">
                        <div class="bot-type-icon">🤖</div>
                        <div class="bot-type-badge badge-available">متاح فوراً</div>
                        <div class="bot-type-title">البوت التقليدي</div>
                        <div class="bot-type-desc">مثالي للمتاجر والمطاعم والمحلات</div>
                    </div>
                    <div class="bot-type-card" onclick="selectBotType('custom')">
                        <div class="bot-type-icon">⚡</div>
                        <div class="bot-type-badge badge-vip">VIP — بموافقة مسبقة</div>
                        <div class="bot-type-title">البوت المخصص</div>
                        <div class="bot-type-desc">بوت مصمم خصيصاً لنشاطك التجاري بتحكم كامل في كل تفاصيله</div>
                    </div>
                </div>
            </div>

            <!-- STEP 2a: Traditional Registration Form -->
            <div id="step2traditional" class="hidden">
                <button class="back-btn" onclick="goBackToStep1()">→ رجوع</button>

                <form id="registerForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name">اسم المتجر *</label>
                            <div class="input-wrapper">
                                <input type="text" id="name" name="name" placeholder="متجري" required>
                                <span class="input-icon">🏪</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="ownerName">اسم المالك *</label>
                            <div class="input-wrapper">
                                <input type="text" id="ownerName" name="ownerName" placeholder="اسمك" required>
                                <span class="input-icon">👤</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="phone">رقم الهاتف *</label>
                            <div class="input-wrapper">
                                <input type="tel" id="phone" name="phone" placeholder="201234567890" required>
                                <span class="input-icon">📱</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="whatsappNumber">رقم الواتساب *</label>
                            <div class="input-wrapper">
                                <input type="tel" id="whatsappNumber" name="whatsappNumber" placeholder="201234567890" required>
                                <span class="input-icon">💬</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">كلمة المرور *</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" placeholder="••••••••" required>
                            <span class="input-icon">🔒</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">تأكيد كلمة المرور *</label>
                        <div class="input-wrapper">
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required>
                            <span class="input-icon">🔐</span>
                        </div>
                    </div>

                    <button type="submit" class="btn" id="registerBtn">
                        <span>إنشاء حساب جديد</span>
                    </button>
                </form>
            </div>

            <!-- STEP 2b: Custom Bot Request Form -->
            <div id="step2custom" class="hidden">
                <button class="back-btn" onclick="goBackToStep1()">→ رجوع</button>

                <form id="customRequestForm">
                    <div class="form-group">
                        <label for="crCompany">اسم المتجر أو الشركة *</label>
                        <div class="input-wrapper">
                            <input type="text" id="crCompany" placeholder="اسم شركتك" required>
                            <span class="input-icon">🏢</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="crIndustry">مجال العمل *</label>
                        <div class="input-wrapper">
                            <input type="text" id="crIndustry" placeholder="مثال: شركة إنترنت، عقارات، سياحة..." required>
                            <span class="input-icon">💼</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="crPhone">رقم التواصل *</label>
                        <div class="input-wrapper">
                            <input type="tel" id="crPhone" placeholder="201234567890" required>
                            <span class="input-icon">📱</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="crMessage">ما الذي تحتاجه؟ *</label>
                        <textarea id="crMessage" placeholder="صف لنا باختصار ما تريد أن يفعله البوت..." required></textarea>
                    </div>

                    <button type="submit" class="btn" id="customRequestBtn">
                        <span>أرسل الطلب</span>
                    </button>
                </form>

                <div class="custom-request-note">
                    ⏳ سيتم التواصل معك خلال 24 ساعة لمناقشة التفاصيل
                </div>
            </div>

            <div class="login-section">
                <p>لديك حساب بالفعل؟</p>
                <a href="login.html" class="login-link">
                    تسجيل الدخول <span>→</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';

        // ═══════ Step Navigation ═══════
        function selectBotType(type) {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('stepDot1').classList.remove('active');
            document.getElementById('stepDot2').classList.add('active');
            hideError(); hideSuccess();

            if (type === 'traditional') {
                document.getElementById('step2traditional').classList.remove('hidden');
                document.getElementById('step2custom').classList.add('hidden');
                document.getElementById('pageSubtitle').textContent = 'إنشاء حساب جديد لمتجرك';
            } else {
                document.getElementById('step2custom').classList.remove('hidden');
                document.getElementById('step2traditional').classList.add('hidden');
                document.getElementById('pageSubtitle').textContent = 'طلب بوت مخصص VIP';
            }
        }

        function goBackToStep1() {
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2traditional').classList.add('hidden');
            document.getElementById('step2custom').classList.add('hidden');
            document.getElementById('stepDot1').classList.add('active');
            document.getElementById('stepDot2').classList.remove('active');
            document.getElementById('pageSubtitle').textContent = 'اختر نوع البوت المناسب لك';
            hideError(); hideSuccess();
        }

        // ═══════ Traditional Registration ═══════
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = {
                name: document.getElementById('name').value,
                ownerName: document.getElementById('ownerName').value,
                phone: document.getElementById('phone').value,
                whatsappNumber: document.getElementById('whatsappNumber').value,
                password: document.getElementById('password').value,
                confirmPassword: document.getElementById('confirmPassword').value
            };
            const registerBtn = document.getElementById('registerBtn');

            if (formData.password !== formData.confirmPassword) { showError('كلمتا المرور غير متطابقتين'); return; }
            if (!formData.phone.startsWith('20') || formData.phone.length !== 12) { showError('رقم الهاتف يجب أن يبدأ بـ 20 ويكون 12 رقم'); return; }
            if (!formData.whatsappNumber.startsWith('20') || formData.whatsappNumber.length !== 12) { showError('رقم الواتساب يجب أن يبدأ بـ 20 ويكون 12 رقم'); return; }
            if (formData.password.length < 6) { showError('كلمة المرور يجب أن تكون 6 أحرف على الأقل'); return; }

            registerBtn.disabled = true;
            registerBtn.innerHTML = '<div class="loading"></div><span>جاري إنشاء الحساب...</span>';
            hideError(); hideSuccess();

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: formData.name, ownerName: formData.ownerName,
                        phone: formData.phone, whatsappNumber: formData.whatsappNumber,
                        password: formData.password
                    })
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('shop', JSON.stringify(data.shop));
                    window.location.href = 'payment-required.html';
                } else {
                    const msg = data.details ? (Array.isArray(data.details) ? data.details.map(e => e.message).join(', ') : data.details) : (data.error || 'فشل إنشاء الحساب');
                    showError(msg);
                }
            } catch (error) {
                showError('حدث خطأ في الاتصال. يرجى المحاولة مرة أخرى');
            } finally {
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<span>إنشاء حساب جديد</span>';
            }
        });

        // ═══════ Custom Bot Request ═══════
        document.getElementById('customRequestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('customRequestBtn');
            const data = {
                companyName: document.getElementById('crCompany').value.trim(),
                industry: document.getElementById('crIndustry').value.trim(),
                phone: document.getElementById('crPhone').value.trim(),
                message: document.getElementById('crMessage').value.trim(),
            };

            if (!data.companyName || !data.industry || !data.phone || !data.message) {
                showError('يرجى ملء جميع الحقول'); return;
            }

            btn.disabled = true;
            btn.innerHTML = '<div class="loading"></div><span>جاري الإرسال...</span>';
            hideError(); hideSuccess();

            try {
                const response = await fetch(`${API_BASE}/custom-bot/request`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (response.ok) {
                    showSuccess(result.message || 'تم إرسال طلبك بنجاح!');
                    document.getElementById('customRequestForm').reset();
                } else {
                    showError(result.error || 'فشل في إرسال الطلب');
                }
            } catch (error) {
                showError('حدث خطأ في الاتصال');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>أرسل الطلب</span>';
            }
        });

        // ═══════ Helpers ═══════
        function showError(message) {
            const el = document.getElementById('error');
            document.getElementById('errorText').textContent = message;
            el.classList.add('show'); hideSuccess();
            setTimeout(hideError, 5000);
        }
        function hideError() { document.getElementById('error').classList.remove('show'); }
        function showSuccess(message) {
            const el = document.getElementById('success');
            document.getElementById('successText').textContent = message;
            el.classList.add('show'); hideError();
        }
        function hideSuccess() { document.getElementById('success').classList.remove('show'); }

        // Check if already logged in
        window.addEventListener('load', async () => {
            const token = localStorage.getItem('token');
            if (token) {
                try {
                    const res = await fetch(`${API_BASE}/shop/me`, { headers: { 'Authorization': `Bearer ${token}` } });
                    if (res.ok) {
                        const shop = JSON.parse(localStorage.getItem('shop') || '{}');
                        window.location.href = shop.shopType === 'custom' ? 'custom-dashboard.html' : 'dashboard.html';
                    } else { localStorage.removeItem('token'); localStorage.removeItem('shop'); }
                } catch { localStorage.removeItem('token'); localStorage.removeItem('shop'); }
            }
        });
    </script>
</body>
</html>
