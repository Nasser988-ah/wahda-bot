<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنتجات - Zaki Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }
        
        .sidebar {
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            padding: var(--space-lg);
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            width: 250px;
            overflow-y: auto;
            z-index: 100;
        }
        
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            margin-bottom: var(--space-xl);
            padding-bottom: var(--space-md);
            border-bottom: 1px solid var(--border-color);
        }
        
        .sidebar-logo-icon {
            width: 45px;
            height: 45px;
            background: var(--gradient-primary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .sidebar-logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-item {
            margin-bottom: var(--space-xs);
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md);
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: all var(--transition-base);
        }
        
        .nav-link:hover,
        .nav-link.active {
            background: var(--bg-glass);
            color: var(--text-primary);
        }
        
        .nav-link.active {
            background: var(--gradient-primary);
            color: white;
        }
        
        .main-content {
            margin-right: 250px;
            padding: var(--space-lg);
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-lg);
            flex-wrap: wrap;
            gap: var(--space-sm);
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--space-md);
        }
        
        .product-card {
            padding: var(--space-md);
            position: relative;
            overflow: hidden;
        }
        
        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-primary);
            transform: scaleX(0);
            transition: transform var(--transition-base);
        }
        
        .product-card:hover::before {
            transform: scaleX(1);
        }
        
        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--space-sm);
        }
        
        .product-name {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .product-category {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        
        .product-price {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: var(--space-sm) 0;
        }
        
        .product-actions {
            display: flex;
            gap: var(--space-xs);
            margin-top: var(--space-md);
        }
        
        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-base);
        }
        
        .btn-icon:hover {
            background: var(--bg-glass);
            color: var(--text-primary);
            border-color: var(--primary);
        }
        
        .btn-icon.delete:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: #ef4444;
        }
        
        .add-product-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-md);
            margin-bottom: var(--space-lg);
        }
        
        .empty-state {
            text-align: center;
            padding: var(--space-xl);
            color: var(--text-secondary);
        }
        
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: var(--space-md);
            opacity: 0.5;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-base);
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-content {
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            padding: var(--space-lg);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-md);
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color var(--transition-base);
        }
        
        .modal-close:hover {
            color: var(--text-primary);
        }
        
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(100%);
            }
            
            .main-content {
                margin-right: 0;
            }
        }
        
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .add-product-form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="dashboard-grid">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon">🤖</div>
                <span class="sidebar-logo-text">Zaki</span>
            </div>
            
            <nav>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a href="dashboard.html" class="nav-link">
                            <span>📊</span>
                            <span>لوحة التحكم</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="products.html" class="nav-link active">
                            <span>📦</span>
                            <span>المنتجات</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="qr.html" class="nav-link">
                            <span>📱</span>
                            <span>اتصال الواتساب</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>
        
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">📦 المنتجات</h1>
                    <p class="page-subtitle">إدارة منتجات متجرك</p>
                </div>
                <button class="btn btn-primary" onclick="openModal()">
                    <span>+</span>
                    <span>إضافة منتج</span>
                </button>
            </div>
            
            <div class="glass-card" style="margin-bottom: var(--space-lg); padding: var(--space-md);">
                <form id="quickAddForm" class="add-product-form">
                    <div class="form-group" style="margin-bottom: 0;">
                        <input type="text" id="quickName" class="form-input" placeholder="اسم المنتج" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <input type="number" id="quickPrice" class="form-input" placeholder="السعر" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <input type="text" id="quickCategory" class="form-input" placeholder="الفئة (اختياري)">
                    </div>
                    <button type="submit" class="btn btn-primary" style="height: fit-content;">
                        إضافة سريعة
                    </button>
                </form>
            </div>
            
            <div id="productsContainer" class="products-grid">
                <div class="empty-state glass-card">
                    <div class="empty-state-icon">📦</div>
                    <h3>لا توجد منتجات</h3>
                    <p>ابدأ بإضافة منتجات إلى متجرك</p>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Modal -->
    <div id="productModal" class="modal-overlay">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h2>إضافة منتج جديد</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="productForm">
                <div class="form-group">
                    <label class="form-label">اسم المنتج</label>
                    <input type="text" id="productName" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">السعر</label>
                    <input type="number" id="productPrice" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">الفئة</label>
                    <input type="text" id="productCategory" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">الوصف</label>
                    <textarea id="productDescription" class="form-input" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">
                        <input type="checkbox" id="productAvailable" checked>
                        متاح للبيع
                    </label>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    حفظ المنتج
                </button>
            </form>
        </div>
    </div>
    
    <script>
        const API_URL = window.location.origin + '/api';
        const token = localStorage.getItem('token');
        
        if (!token) {
            window.location.href = 'login.html';
        }
        
        let products = [];
        
        async function loadProducts() {
            try {
                const response = await fetch(`${API_URL}/products`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    products = data.products || [];
                    renderProducts();
                }
            } catch (error) {
                console.error('Failed to load products:', error);
            }
        }
        
        function renderProducts() {
            const container = document.getElementById('productsContainer');
            
            if (products.length === 0) {
                container.innerHTML = `
                    <div class="empty-state glass-card">
                        <div class="empty-state-icon">📦</div>
                        <h3>لا توجد منتجات</h3>
                        <p>ابدأ بإضافة منتجات إلى متجرك</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = products.map(product => `
                <div class="product-card glass-card">
                    <div class="product-header">
                        <div>
                            <div class="product-name">${product.name}</div>
                            <div class="product-category">${product.category || 'بدون فئة'}</div>
                        </div>
                    </div>
                    <div class="product-price">${product.price} ج.م</div>
                    <div style="color: var(--text-secondary); font-size: 0.875rem;">
                        ${product.isAvailable ? '🟢 متاح' : '🔴 غير متاح'}
                    </div>
                    <div class="product-actions">
                        <button class="btn-icon" onclick="editProduct('${product.id}')" title="تعديل">
                            ✏️
                        </button>
                        <button class="btn-icon delete" onclick="deleteProduct('${product.id}')" title="حذف">
                            🗑️
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        // Quick add form
        document.getElementById('quickAddForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const productData = {
                name: document.getElementById('quickName').value,
                price: parseFloat(document.getElementById('quickPrice').value),
                category: document.getElementById('quickCategory').value,
                isAvailable: true
            };
            
            try {
                const response = await fetch(`${API_URL}/products`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(productData)
                });
                
                if (response.ok) {
                    document.getElementById('quickAddForm').reset();
                    loadProducts();
                } else {
                    alert('فشل إضافة المنتج');
                }
            } catch (error) {
                console.error('Failed to add product:', error);
                alert('حدث خطأ في الاتصال');
            }
        });
        
        // Modal form
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const productData = {
                name: document.getElementById('productName').value,
                price: parseFloat(document.getElementById('productPrice').value),
                category: document.getElementById('productCategory').value,
                description: document.getElementById('productDescription').value,
                isAvailable: document.getElementById('productAvailable').checked
            };
            
            try {
                const response = await fetch(`${API_URL}/products`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(productData)
                });
                
                if (response.ok) {
                    closeModal();
                    document.getElementById('productForm').reset();
                    loadProducts();
                } else {
                    alert('فشل إضافة المنتج');
                }
            } catch (error) {
                console.error('Failed to add product:', error);
                alert('حدث خطأ في الاتصال');
            }
        });
        
        async function deleteProduct(id) {
            if (!confirm('هل أنت متأكد من حذف هذا المنتج؟')) return;
            
            try {
                const response = await fetch(`${API_URL}/products/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    loadProducts();
                } else {
                    alert('فشل حذف المنتج');
                }
            } catch (error) {
                console.error('Failed to delete product:', error);
                alert('حدث خطأ في الاتصال');
            }
        }
        
        function openModal() {
            document.getElementById('productModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
        }
        
        // Close modal on overlay click
        document.getElementById('productModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                closeModal();
            }
        });
        
        // Initial load
        loadProducts();
    </script>
</body>
</html>
